      #dchips {
        flex: 1;
        display: flex;
        gap: 6px;
        overflow-x: auto;
        scrollbar-width: none;
        padding: 2px;
      }
      #dchips::-webkit-scrollbar {
        display: none;
      }
      .dch {
        flex: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        line-height: 1.05;
        padding: 6px 11px;
        border-radius: 13px;
        background: var(--gl-bg);
        backdrop-filter: blur(22px) saturate(1.6);
        -webkit-backdrop-filter: blur(22px) saturate(1.6);
        border: 1px solid var(--gl-bd);
        box-shadow: 0 4px 14px rgba(23, 34, 51, 0.12);
        color: var(--ink);
        transition: transform 0.15s;
      }
      .dch b {
        font-size: 13px;
        font-weight: 800;
      }
      .dch span {
        font-size: 9.5px;
        color: var(--ink2);
        font-weight: 600;
      }
      .dch.on {
        background: linear-gradient(155deg, #f2664b, #df3f23);
        border-color: rgba(255, 255, 255, 0.55);
        color: #fff3e8;
        box-shadow: 0 6px 18px rgba(195, 52, 24, 0.4);
      }
      .dch.on span {
        color: #ffd9c4;
      }
      .dch:active {
        transform: scale(0.93);
      }
      #btnSet {
        flex: none;
        width: 36px;
        height: 36px;
        border-radius: 12px;
        font-size: 16px;
        background: var(--gl-bg);
        backdrop-filter: blur(22px) saturate(1.6);
        -webkit-backdrop-filter: blur(22px) saturate(1.6);
        border: 1px solid var(--gl-bd);
        box-shadow: 0 4px 14px rgba(23, 34, 51, 0.12);
      }

      /* ---------- 右侧浮钮 ---------- */
      #sidectl {
        position: fixed;
        right: 10px;
        top: calc(var(--sa-t) + 64px);
        z-index: 640;
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      #sidectl button {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        font-size: 17px;
        color: #3a4653;
        background: var(--gl-bg);
        backdrop-filter: blur(22px) saturate(1.7);
        -webkit-backdrop-filter: blur(22px) saturate(1.7);
        border: 1px solid var(--gl-bd);
        box-shadow: var(--shadow);
      }
      #sidectl button:active {
        transform: scale(0.92);
      }

      /* ---------- 随缘泡泡 ---------- */
      #bub {
        position: fixed;
        inset: 0;
        z-index: 644;
        pointer-events: none;
      }
      .bb {
        position: fixed;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        pointer-events: auto;
        touch-action: none;
        animation:
          bbIn 0.42s cubic-bezier(0.2, 1.5, 0.4, 1) backwards,
          bbFloat 4.8s ease-in-out 0.9s infinite;
      }
      .bb-c {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 25px;
        background: linear-gradient(
          160deg,
          rgba(255, 255, 255, 0.9),
          rgba(255, 255, 255, 0.62)
        );
        backdrop-filter: blur(18px) saturate(1.8);
        -webkit-backdrop-filter: blur(18px) saturate(1.8);
        border: 2.5px solid var(--cc, #3e7bd6);
        box-shadow:
          0 8px 22px rgba(23, 34, 51, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
      }
      .bb-n {
        max-width: 104px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: normal;
        text-align: center;
        line-height: 1.15;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        font-size: 10.5px;
        font-weight: 800;
        padding: 2.5px 7px;
        border-radius: 9px;
        color: #2c3947;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 2px 8px rgba(23, 34, 51, 0.16);
      }
      .bb.front {
        z-index: 650;
      }
      .bb.front .bb-c {
        transform: scale(1.08);
        box-shadow:
          0 14px 30px rgba(23, 34, 51, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.94);
      }
      .bb.front .bb-n {
        max-width: 148px;
        -webkit-line-clamp: 2;
      }
      .bb.drag {
        animation: none;
        z-index: 646;
      }
      .bb.drag .bb-c {
        transform: scale(1.16);
        border-width: 3px;
        box-shadow: 0 16px 34px rgba(23, 34, 51, 0.34);
      }
      .bb.out {
        animation: bbOut 0.24s ease-in forwards;
      }
      @keyframes bbIn {
        0% {
          opacity: 0;
          transform: translate(-50%, -20%) scale(0.3);
        }
        100% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
      }
      @keyframes bbOut {
        to {
          opacity: 0;
          transform: translate(-50%, -64%) scale(0.4);
        }
      }
      @keyframes bbFloat {
        0%,
        100% {
          margin-top: 0;
        }
        50% {
          margin-top: -2px;
        }
      }

      /* 底部拖放条 */
      #dropbar {
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: calc(var(--sa-b) + 10px);
        z-index: 760;
        height: 82px;
        border-radius: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14.5px;
        font-weight: 800;
        color: #8c2f1b;
        background: linear-gradient(
          160deg,
          rgba(255, 240, 232, 0.88),
          rgba(255, 255, 255, 0.6)
        );
        backdrop-filter: blur(24px) saturate(1.7);
        -webkit-backdrop-filter: blur(24px) saturate(1.7);
        border: 2px dashed rgba(224, 73, 46, 0.55);
        box-shadow: var(--shadow);
        opacity: 0;
        transform: translateY(120%);
        transition:
          transform 0.28s cubic-bezier(0.2, 0.9, 0.3, 1),
          opacity 0.2s;
        pointer-events: none;
      }
      #dropbar.on {
        opacity: 1;
        transform: translateY(0);
      }
      #dropbar.hot {
        background: linear-gradient(160deg, #f2664b, #df3f23);
        color: #fff3e8;
        border-color: rgba(255, 255, 255, 0.7);
        transform: translateY(0) scale(1.02);
      }

      /* ---------- 底部抽屉 ---------- */
      #drawer {
        position: fixed;
        left: 0;
        right: 0;
        top: 0;
        height: calc(100% + 64px);
        z-index: 655;
        transform: translateY(60%);
        will-change: transform;
        border-radius: 24px 24px 0 0;
        background: linear-gradient(
          165deg,
          rgba(250, 248, 242, 0.82),
          rgba(247, 244, 236, 0.93) 46%,
          rgba(247, 244, 236, 0.98)
        );
        backdrop-filter: blur(28px) saturate(1.75);
        -webkit-backdrop-filter: blur(28px) saturate(1.75);
        border-top: 1px solid rgba(255, 255, 255, 0.85);
        box-shadow: 0 -12px 44px rgba(23, 34, 51, 0.22);
        display: flex;
        flex-direction: column;
      }
      #drawer.anim {
        transition: transform 0.32s cubic-bezier(0.22, 0.9, 0.28, 1);
      }
      #grab {
        flex: none;
        padding: 8px 10px 6px;
        touch-action: none;
        position: relative;
      }
      #grab::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 6px;
        transform: translateX(-50%);
        width: 44px;
        height: 5px;
        border-radius: 3px;
        background: rgba(27, 37, 48, 0.22);
      }
      #tabs {
        display: flex;
        gap: 6px;
        margin-top: 9px;
      }
      #tabs button {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        padding: 8px 4px;
        border-radius: 13px;
        font-size: 12.5px;
        font-weight: 700;
        color: var(--ink2);
        background: rgba(255, 255, 255, 0.42);
        border: 1px solid rgba(255, 255, 255, 0.6);
        transition: all 0.18s;
      }
      #tabs button .ti {
        font-size: 14px;
      }
      #tabs button.on {
        background: linear-gradient(155deg, #2a3542, #1b2530);
        color: #f6efe3;
        box-shadow: 0 5px 14px rgba(23, 34, 51, 0.3);
        border-color: rgba(255, 255, 255, 0.15);
      }
      #dbody {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
        padding: 4px 12px calc(var(--sa-b) + 140px);
      }
      .view {
        display: none;
      }
      .view.on {
        display: block;
      }

      /* 日头部 */
      .dhead {
        padding: 6px 4px 10px;
      }
      .dhead h2 {
        font-size: 17px;
        font-weight: 900;
        letter-spacing: 0.3px;
      }
      .dhead h2 small {
        font-weight: 700;
        color: var(--verm);
        margin-right: 6px;
        font-size: 13px;
      }
      .dhead p {
        margin-top: 4px;
        font-size: 12px;
        line-height: 1.55;
        color: var(--ink2);
      }

      /* D3 开关 */
      .sw-row {
        display: flex;
        gap: 8px;
        margin: 2px 0 10px;
      }
      .sw {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 11px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.7);
        font-size: 12px;
        font-weight: 700;
        color: var(--ink2);
        box-shadow: 0 3px 10px rgba(23, 34, 51, 0.08);
      }
      .sw .kn {
        flex: none;
        width: 36px;
        height: 21px;
        border-radius: 12px;
        background: rgba(27, 37, 48, 0.18);
        position: relative;
        transition: background 0.2s;
      }
      .sw .kn::after {
        content: "";
        position: absolute;
        left: 2px;
        top: 2px;
        width: 17px;
        height: 17px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        transition: left 0.2s;
      }
      .sw.on {
        color: var(--ink);
      }
      .sw.on .kn {
        background: var(--verm);
      }
      .sw.on .kn::after {
        left: 17px;
      }


      /* 卡片 */
      .card {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 10px;
        margin-bottom: 8px;
        border-radius: 16px;
        background: linear-gradient(
          160deg,
          rgba(255, 255, 255, 0.78),
          rgba(255, 255, 255, 0.5)
        );
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 4px 14px rgba(23, 34, 51, 0.09);
        transition:
          transform 0.15s,
          box-shadow 0.2s;
      }
      .card:active {
        transform: scale(0.985);
      }
      .card.cur {
        border-color: rgba(224, 73, 46, 0.65);
        box-shadow: 0 6px 18px rgba(224, 73, 46, 0.22);
      }
      .card.done {
        opacity: 0.55;
      }
      .card.done .cn {
        text-decoration: line-through;
      }
      .cbd {
        flex: none;
        width: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .cbd .stamp {
        min-width: 42px;
        padding: 4px 5px;
        border-radius: 8px;
        text-align: center;
        background: linear-gradient(155deg, #ea5b41, #df3f23);
        color: #fff3e8;
        font-size: 11.5px;
        font-weight: 900;
        letter-spacing: 0.4px;
        transform: rotate(-5deg);
        box-shadow: 0 3px 8px rgba(195, 52, 24, 0.35);
        border: 1.5px solid rgba(255, 246, 236, 0.9);
      }
      .cbd .num {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(150deg, #5e96e6, #3e7bd6);
        color: #fff;
        font-size: 13px;
        font-weight: 800;
        box-shadow: 0 3px 8px rgba(46, 88, 152, 0.35);
        border: 2px solid #fff;
      }
      .cmid {
        flex: 1;
        min-width: 0;
      }
      .cn {
        font-size: 14px;
        font-weight: 800;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .cn .ce {
        margin-right: 3px;
      }
      .cd {
        margin-top: 2px;
        font-size: 11px;
        color: var(--ink2);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .cact {
        flex: none;
        display: flex;
        align-items: center;
        gap: 2px;
      }
      .cact button {
        width: 31px;
        height: 31px;
        border-radius: 10px;
        font-size: 14px;
        color: #77828e;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .cact button:active {
        background: rgba(27, 37, 48, 0.08);
      }
      .cact .b-done.on {
        color: #3e9c6b;
      }
      .cact .b-drag {
        touch-action: none;
        font-size: 15px;
        color: #9aa5b0;
      }
      .card.ghost {
        position: fixed;
        z-index: 900;
        margin: 0;
        pointer-events: none;
        box-shadow: 0 18px 40px rgba(23, 34, 51, 0.32);
        transform: scale(1.03) rotate(1deg);
        opacity: 0.96;
      }
      .ph {
        border: 2px dashed rgba(62, 123, 214, 0.5);
        border-radius: 16px;
        margin-bottom: 8px;
        background: rgba(62, 123, 214, 0.06);
      }
      .skipnote {
        margin: 2px 0 10px;
        padding: 9px 12px;
        border-radius: 13px;
        font-size: 11.5px;
        font-weight: 700;
        color: #7a5a17;
        background: rgba(233, 203, 130, 0.32);
        border: 1px dashed rgba(201, 162, 75, 0.6);
      }
      .dtip {
        margin: 12px 2px 0;
        font-size: 11px;
        color: #98a2ad;
        text-align: center;
        line-height: 1.6;
      }

      /* 随缘池 */
      .pool-tgt {
        display: flex;
        align-items: center;
        gap: 6px;
        margin: 4px 0 12px;
        flex-wrap: wrap;
      }
      .pool-tgt .lb {
        font-size: 12px;
        font-weight: 800;
        color: var(--ink2);
      }
      .tch {
        padding: 5px 11px;
        border-radius: 11px;
        font-size: 12px;
        font-weight: 800;
        color: var(--ink2);
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.7);
      }
      .tch.on {
        background: linear-gradient(155deg, #f2664b, #df3f23);
        color: #fff3e8;
      }
      .ar-h {
        margin: 14px 2px 8px;
        font-size: 13px;
        font-weight: 900;
        color: #33404e;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .ar-h::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(27, 37, 48, 0.12);
      }
      .pc .cbd {
        width: 36px;
      }
      .pc .cbd .em {
        font-size: 21px;
      }
      .pc .b-add {
        color: var(--verm);
        font-size: 19px;
        font-weight: 800;
      }
      .ptag {
        flex: none;
        font-size: 10px;
        font-weight: 800;
        color: #3e7bd6;
        background: rgba(62, 123, 214, 0.12);
        padding: 3px 7px;
        border-radius: 8px;
      }

      /* 日语 */
      .lg-s {
        margin: 16px 2px 8px;
        font-size: 14px;
        font-weight: 900;
      }
      .lg-r {
        padding: 9px 12px;
        margin-bottom: 7px;
        border-radius: 14px;
        background: linear-gradient(
          160deg,
          rgba(255, 255, 255, 0.75),
          rgba(255, 255, 255, 0.5)
        );
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 3px 10px rgba(23, 34, 51, 0.07);
      }
      .lg-r .jp {
        font-size: 14.5px;
        font-weight: 800;
        line-height: 1.45;
        -webkit-user-select: text;
        user-select: text;
      }
      .lg-r .cn2 {
        margin-top: 3px;
        font-size: 11.5px;
        color: var(--ink2);
        line-height: 1.5;
      }

      /* 情报 */
      .if-h {
        margin: 16px 2px 8px;
        font-size: 14px;
        font-weight: 900;
      }
      .if-c {
        padding: 11px 13px;
        margin-bottom: 8px;
        border-radius: 15px;
        font-size: 12.5px;
        line-height: 1.65;
        background: linear-gradient(
          160deg,
          rgba(255, 255, 255, 0.75),
          rgba(255, 255, 255, 0.5)
        );
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 3px 10px rgba(23, 34, 51, 0.07);
      }
      .if-c b {
        color: #8c2f1b;
      }
      .if-c .row {
        display: flex;
        gap: 8px;
        margin: 5px 0;
      }
      .if-c .row .k {
        flex: none;
        font-weight: 800;
      }
      .btn-ghost {
        width: 100%;
        margin-top: 6px;
        padding: 11px;
        border-radius: 14px;
        font-size: 13px;
        font-weight: 800;
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(27, 37, 48, 0.14);
        color: var(--ink2);
      }
      .btn-danger {
        color: #c0341b;
        border-color: rgba(224, 73, 46, 0.4);
      }

      /* ---------- 详情 Sheet ---------- */
      #sheet {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 700;
        /* 三档高度：peek（默认，不挡泡泡）/ mid / full，由 JS 切 class */
        height: 228px;
        max-height: 86vh;
        max-height: 86dvh;
        display: flex;
        flex-direction: column;
        border-radius: 24px 24px 0 0;
        transition:
          transform 0.34s cubic-bezier(0.22, 0.9, 0.28, 1),
          height 0.3s cubic-bezier(0.22, 0.9, 0.28, 1);
        background: linear-gradient(
          165deg,
          rgba(252, 250, 245, 0.9),
          rgba(246, 243, 235, 0.78)
        );
        backdrop-filter: blur(30px) saturate(1.8);
        -webkit-backdrop-filter: blur(30px) saturate(1.8);
        border-top: 1px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 -14px 48px rgba(23, 34, 51, 0.3);
        transform: translateY(112%);
      }
      #sheet.on {
        transform: translateY(0);
      }
      #sheet.mid {
        height: 48vh;
        height: 48dvh;
      }
      #sheet.full {
        height: 86vh;
        height: 86dvh;
      }
      /* peek 档只露：标题 + 一句描述 + 底部操作栏，其余上拉再看 */
      #sheet.peek #sbody {
        overflow: hidden;
      }
      .shd {
        flex: none;
        padding: 14px 16px 4px;
        position: relative;
        touch-action: none;
      }
      .shd::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 7px;
        transform: translateX(-50%);
        width: 40px;
        height: 5px;
        border-radius: 3px;
        background: rgba(27, 37, 48, 0.2);
      }
      .sbrow {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 6px;
      }
      .sb-em {
        width: 34px;
        height: 34px;
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 19px;
        background: var(--tint, rgba(62, 123, 214, 0.15));
      }
      .chip {
        padding: 4px 9px;
        border-radius: 9px;
        font-size: 11px;
        font-weight: 800;
        color: var(--ink2);
        background: rgba(27, 37, 48, 0.07);
      }
      .chip.time {
        background: linear-gradient(155deg, #ea5b41, #df3f23);
        color: #fff3e8;
        transform: rotate(-3deg);
        letter-spacing: 0.4px;
      }
      #stitle {
        margin-top: 8px;
        font-size: 18px;
        font-weight: 900;
        line-height: 1.3;
        padding-right: 34px;
      }
      #stitle small {
        display: block;
        font-size: 11.5px;
        color: var(--ink2);
        font-weight: 600;
        margin-top: 2px;
      }
      #sclose {
        position: absolute;
        right: 12px;
        top: 14px;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: rgba(27, 37, 48, 0.08);
        font-size: 13px;
        color: var(--ink2);
      }
      #sbody {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
        padding: 6px 16px 12px;
      }
      /* 底部固定操作栏：打卡 / 加入·移出 / 随缘池 / 导航 / 更多 */
      #sfoot {
        flex: none;
        display: flex;
        gap: 8px;
        padding: 9px 14px calc(var(--sa-b) + 12px);
        border-top: 1px solid rgba(23, 34, 51, 0.07);
        background: rgba(252, 250, 245, 0.86);
        backdrop-filter: blur(18px);

      /* ---------- Toast ---------- */

      .more-fields {

      /* ==== 「＋ 添加」虚线按钮（行程 / 随缘池 / 语言 / 情报共用） ==== */
      .add-place {

      /* ==== 语言包 / 情报页的小操作按钮 ==== */

      .lg-del,

        transform: translateY(-50%);

        color: var(--ink2);

      }

        position: relative;
        padding-right: 30px;
      }

        position: absolute;
        right: 0;
        top: 2px;
        opacity: 0.5;
      }

      /* ---------- AI 旅行搭子（v6 · 小号 2D 像素眼，无嘴不吓人） ---------- */
      #aiFab {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 674;
        width: 44px;
        height: 44px;
        padding: 0;
        border: 0;
        border-radius: 16px;
        display: block;
        background: transparent;
        box-shadow: none;
        overflow: visible;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        --eye-x: 0px;
        --eye-y: 0px;
        transition: transform 0.2s ease, filter 0.22s ease;
      }
      #aiFab:active {
        transform: scale(0.94);
      }
      #aiFab.dragging {
        transform: scale(1.06);
      }
      #aiFab::before {
        content: "";
        position: absolute;
        left: 8px;
        right: 8px;
        bottom: -4px;
        height: 8px;
        z-index: 0;
        border-radius: 999px;
        background: radial-gradient(ellipse at center, rgba(73, 91, 162, 0.18), rgba(73, 91, 162, 0));
        pointer-events: none;
        animation: aiShadowBob 4s ease-in-out infinite;
      }
      .ai-face {
        position: absolute;
        inset: 0;
        z-index: 2;
        border-radius: 16px;
        background:
          radial-gradient(circle at 32% 26%, rgba(255, 255, 255, 0.95) 0 20%, rgba(255, 255, 255, 0) 46%),
          linear-gradient(165deg, #ffffff, #eef1fb 68%, #e3e8f9);
        border: 1px solid rgba(120, 134, 200, 0.22);
        box-shadow:
          0 6px 14px rgba(92, 108, 190, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        animation: aiBuddyBob 4s ease-in-out infinite;
      }
      /* 像素眼：两个圆角小方块，靠它完成全部表情 */
      .ai-eye {
        position: absolute;
        top: 16px;
        width: 7px;
        height: 11px;
        border-radius: 2.5px;
        background: #3d4a8f;
        transform: translate(var(--eye-x), var(--eye-y));
        transition: transform 0.12s linear, height 0.12s ease, background 0.2s ease, box-shadow 0.2s ease;
        animation: aiBlink 5.4s infinite;
      }
      .ai-eye.l {
        left: 13px;
      }
      .ai-eye.r {
        right: 13px;
      }
      .ai-eye i {
        display: none;
      }
      /* 思考中：眼睛左右扫 */
      #aiFab.think .ai-eye {
        animation: aiScan 1.1s ease-in-out infinite;
      }
      /* 回复到达：眼睛亮一下 */
      #aiFab.ping .ai-eye {
        background: #6d84ff;
        box-shadow: 0 0 8px rgba(109, 132, 255, 0.85);
      }
      /* 面板开着：微微眯眼（专注） */
      #aiFab.on .ai-eye {
        height: 9px;
      }
      @keyframes aiBuddyBob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-2px); }
      }
      @keyframes aiShadowBob {
        0%, 100% { transform: scaleX(1); opacity: 0.85; }
        50% { transform: scaleX(0.9); opacity: 0.62; }
      }
      @keyframes aiBlink {
        0%, 45%, 47%, 100% { transform: translate(var(--eye-x), var(--eye-y)) scaleY(1); }
        46% { transform: translate(var(--eye-x), var(--eye-y)) scaleY(0.14); }
        74%, 76% { transform: translate(var(--eye-x), var(--eye-y)) scaleY(1); }
        75% { transform: translate(var(--eye-x), var(--eye-y)) scaleY(0.18); }
      }
      @keyframes aiScan {
        0%, 100% { transform: translate(calc(var(--eye-x) - 3px), var(--eye-y)); }
        50% { transform: translate(calc(var(--eye-x) + 3px), var(--eye-y)); }
      }
      #aiPanel {
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: calc(var(--sa-b) + 10px);
        z-index: 782;
        max-height: min(76vh, 650px);
        overflow: hidden;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(28px) saturate(1.7);
        -webkit-backdrop-filter: blur(28px) saturate(1.7);
        box-shadow: 0 22px 60px rgba(23, 34, 51, 0.27);
        border: 1px solid rgba(255, 255, 255, 0.72);
        opacity: 0;
        pointer-events: none;
        transform: translateY(calc(100% + 28px));
        transition:
          transform 0.28s cubic-bezier(0.2, 0.9, 0.25, 1),
          opacity 0.18s ease;
      }
      #aiPanel.on {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }
      .ai-head {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 15px 10px;
      }
      .ai-logo {
        flex: none;
        width: 36px;
        height: 36px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        background: linear-gradient(145deg, #8e5bd8, #4d7cff);
        box-shadow: 0 8px 18px rgba(142, 91, 216, 0.28);
      }
      .ai-title {
        flex: 1;
        min-width: 0;
      }
      .ai-title b {
        display: block;
        font-size: 16px;
        color: var(--ink);
      }
      .ai-title small {
        display: block;
        margin-top: 2px;
        font-size: 11px;
        font-weight: 700;
        color: var(--ink3);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #aiClose {
        flex: none;
        width: 32px;
        height: 32px;
        border: 0;
        border-radius: 12px;
        background: rgba(23, 34, 51, 0.07);
        color: var(--ink2);
        font-weight: 900;
      }
      .ai-body {
        max-height: calc(min(76vh, 650px) - 60px);
        overflow-y: auto;
        padding: 0 14px 14px;
      }
      .ai-lb {
        margin: 10px 1px 6px;
        font-size: 12px;
        font-weight: 900;
        color: var(--ink2);
      }
      .ai-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .ai-chips button {
        border: 1px solid rgba(142, 91, 216, 0.24);
        border-radius: 999px;
        padding: 7px 10px;
        background: rgba(142, 91, 216, 0.08);
        color: #6547a3;
        font-size: 12px;
        font-weight: 800;
      }
      .ai-chips button.on {
        color: #fff;
        background: linear-gradient(145deg, #8e5bd8, #4d7cff);
        box-shadow: 0 6px 14px rgba(142, 91, 216, 0.22);
      }
      .ai-inputs {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }
      .ai-inputs input,
      .ai-inputs textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid rgba(23, 34, 51, 0.1);
        border-radius: 15px;
        padding: 11px 12px;
        background: rgba(255, 255, 255, 0.78);
        color: var(--ink);
        font-size: 13px;
        font-weight: 700;
        outline: none;
      }
      .ai-inputs textarea {
        min-height: 78px;
        resize: vertical;
        line-height: 1.5;
      }
      .ai-run {
        width: 100%;
        margin-top: 10px;
        border: 0;
        border-radius: 16px;
        padding: 12px 14px;
        background: linear-gradient(145deg, #2f3d55, #1f2838);
        color: #fff;
        font-size: 14px;
        font-weight: 900;
      }
      .ai-run[disabled] {
        opacity: 0.55;
      }
      .ai-res {
        margin-top: 12px;
        display: grid;
        gap: 9px;
      }
      .ai-note {
        padding: 10px 11px;
        border-radius: 15px;
        background: rgba(77, 124, 255, 0.09);
        color: #30456f;
        font-size: 12px;
        font-weight: 800;
        line-height: 1.45;
      }
      .ai-card {
        padding: 11px;
        border-radius: 17px;
        background: rgba(255, 255, 255, 0.76);
        border: 1px solid rgba(23, 34, 51, 0.08);
        box-shadow: 0 6px 18px rgba(23, 34, 51, 0.08);
      }
      .ai-card h4 {
        margin: 0 0 5px;
        font-size: 14px;
        color: var(--ink);
      }
      .ai-card p {
        margin: 0 0 8px;
        color: var(--ink2);
        font-size: 12px;
        line-height: 1.45;
      }
      .ai-actions {
        display: flex;
        gap: 7px;
      }
      .ai-actions button {
        flex: 1;
        border: 0;
        border-radius: 13px;
        padding: 8px;
        background: rgba(142, 91, 216, 0.12);
        color: #6547a3;
        font-size: 12px;
        font-weight: 900;
      }
      .ai-actions button[data-ai-act="plan"] {
        background: rgba(224, 73, 46, 0.12);
        color: var(--verm);
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="saprobe"></div>

    <div id="daybar"></div>
    <div id="presence"></div>
    <div id="pickbar">
      📍 在地图上点一下，放置这个地点<button id="pickCancel">取消</button>
    </div>

    <div id="sidectl">
      <button id="btnFit" title="全览今天">⛶</button>
      <button id="btnLoc" title="我的位置">◎</button>
    </div>

    <div id="drawer">
      <div id="grab">
        <div id="tabs">
          <button data-tab="plan" class="on">
            <span class="ti">🗺️</span>行程
          </button>
          <button data-tab="pool"><span class="ti">🎐</span>随缘池</button>
          <button data-tab="say"><span class="ti">🗣️</span>日语</button>
          <button data-tab="info"><span class="ti">🎫</span>情报</button>
        </div>
      </div>
      <div id="dbody">
        <div class="view on" id="v-plan"></div>
        <div class="view" id="v-pool"></div>
        <div class="view" id="v-say"></div>
        <div class="view" id="v-info"></div>
      </div>
    </div>

    <button id="aiFab" type="button" aria-label="AI 旅行搭子">
      <span class="ai-face">
        <span class="ai-eye l"></span>
        <span class="ai-eye r"></span>
      </span>
    </button>
    <div id="aiPanel" aria-hidden="true">
      <div class="ai-head">
        <div class="ai-logo"></div>
        <div class="ai-title">
          <b>AI 旅行搭子</b>
          <small>只给预览，不会自动改你的行程</small>
        </div>
        <button id="aiClose" type="button">✕</button>
      </div>
      <div class="ai-chat" id="aiChat"></div>
      <div class="ai-prefrow" id="aiPrefs">
        <button type="button" data-pref="少打卡">少打卡</button>
        <button type="button" data-pref="随意逛">随意逛</button>
        <button type="button" data-pref="二次元">二次元</button>
        <button type="button" data-pref="购物">购物</button>
        <button type="button" data-pref="度假">度假</button>
        <button type="button" data-pref="雨天备用">雨天备用</button>
        <button type="button" data-pref="轻松不赶">轻松不赶</button>
      </div>
      <div class="ai-inputbar">
        <textarea
          id="aiWish"
          rows="1"
          placeholder="今天想怎么晃？比如：银座附近别太累…"
        ></textarea>
        <button id="aiSend" type="button">↑</button>
      </div>
    </div>

    <div id="sheet">
      <div class="shd">
        <div class="sbrow" id="sbrow"></div>
        <h3 id="stitle"></h3>
        <button id="sclose">✕</button>
      </div>
      <div id="sbody"></div>
      <div id="sfoot"></div>
    </div>

    <div id="dropbar">⤵ 松手，加入今天的行程</div>

    <div id="toast"></div>

    <div id="pmask"><div class="pcard" id="pcard"></div></div>

    <input
      id="tripFile"
      type="file"
      accept=".json,application/json"
      style="display: none"
    />

    <div id="hint">
      <div class="hcard">
        <h3>🗺️ 口袋旅行 · 玩法</h3>
        <p>
          <span class="hi">📍</span
          ><span
            >点地图上的<b>图钉</b>——它会放大，周围<b>浮出随缘泡泡</b>（附近的备选店和机位）</span
          >
        </p>
        <p>
          <span class="hi">🫧</span
          ><span
            ><b>把泡泡拖到屏幕底部</b>＝加入今天的行程；点泡泡＝看它的详情</span
          >
        </p>
        <p>
          <span class="hi">🃏</span
          ><span
            >下方抽屉：点卡片→地图定位；按住 <b>⠿</b> 拖动调顺序；✕
            随时放回池子</span
          >
        </p>
        <p>
          <span class="hi">📌</span
          ><span
            ><b>图钉章＝重要锚点</b>（机票 / 酒店 /
            预约这类硬节点），其余全是菜单不是任务</span
          >
        </p>
        <button id="hintok">知道了，出发 →</button>
      </div>
    </div>

        /* ---------- 地点编辑器（添加 / 修改 / 删除，锚点需确认） ---------- */
        function catChips(sel) {

        function openEditor(id, opt) {

            esc(p.p || "") +

            (p.ln != null ? p.ln : "") +

          h +=

          h +=

          h +=
            '<div class="pfield"><label>当地名</label><input id="pe-j" placeholder="问路时给人看" value="' +
            esc(p.j || "") +

            '<div class="pfield half"><label>时间</label><input id="pe-t" placeholder="14:30" value="' +
            esc(p.t || "") +
            '"></div><div class="pfield half"><label>交通</label><input id="pe-tr" placeholder="银座线 → 浅草" value="' +
            esc(p.tr || "") +
            '"></div>';
          h +=
            '<div class="pfield"><label>预约情报</label><input id="pe-bk" placeholder="平台 / 订单号 / 时段" value="' +

          h +=
            '<div class="pfield"><label>图片链接</label><input id="pe-ph" placeholder="https://…（系统推荐收编时会自动带上）" value="' +
            esc(p.ph || "") +
            '"></div></div></details>';
          if (!isNew)
            h +=
              '<button class="btn-ghost pdel-row" id="pe-del">🗑 删除这个地点</button>';
          h += '<div class="pbtns">';
          h +=
            '<button class="btn-ghost" id="pe-no">取消</button><button class="pmain" id="pe-ok">' +
            (isNew ? "添加" : "保存修改") +
            "</button></div>";
          openMask(h);
          var selCat = p.c || "spot";
          Array.prototype.forEach.call(
            $("pcard").querySelectorAll(".cchip"),
            function (b) {
              b.addEventListener("click", function () {
                selCat = b.getAttribute("data-c");
                Array.prototype.forEach.call(
                  $("pcard").querySelectorAll(".cchip"),
                  function (x) {
                    x.classList.toggle("on", x === b);
                  },
                );
              });

          );
          $("pe-a").addEventListener("change", function () {
            $("pe-warn").style.display = this.checked ? "" : "none";
            if (this.checked && $("pe-more")) $("pe-more").open = true;
            if (this.checked) toast("⚠️ 注意：你正在把它设为<b>重要锚点</b>");
          });
          function grab() {
            return {
              n: $("pe-n").value.trim(),
              j: $("pe-j").value.trim(),
              c: selCat,
              ar: $("pe-ar").value.trim(),
              p: $("pe-p").value.trim(),
              t: $("pe-t").value.trim(),
              tr: $("pe-tr").value.trim(),
              bk: $("pe-bk").value.trim(),
              ph: $("pe-ph").value.trim(),
              d: $("pe-d").value.trim(),
              la: parseFloat($("pe-la").value),
              ln: parseFloat($("pe-ln").value),
              a: $("pe-a").checked,

          }
          function dirtySnapshot() {
            return JSON.stringify({
              n: $("pe-n").value.trim(),
              j: $("pe-j").value.trim(),
              c: selCat,
              ar: $("pe-ar").value.trim(),
              p: $("pe-p").value.trim(),
              t: $("pe-t").value.trim(),
              tr: $("pe-tr").value.trim(),
              bk: $("pe-bk").value.trim(),
              ph: $("pe-ph").value.trim(),
              d: $("pe-d").value.trim(),
              la: $("pe-la").value.trim(),
              ln: $("pe-ln").value.trim(),
              a: $("pe-a").checked,
            });
          }
          var initialEditorState = opt.initialState || dirtySnapshot();
          _maskBeforeClose = function () {
            if (dirtySnapshot() === initialEditorState) return true;
            return confirm("放弃本次编辑？未保存的修改会丢失。");
          };
          $("pe-pick").addEventListener("click", function () {
            var draft = grab();
            closeMask({ force: true });
            function reopen() {
              openEditor(id, {
                mode: opt.mode,
                dayId: opt.dayId,
                draft: draft,
                initialState: initialEditorState,
              });
            }
            _pick = {
              cb: function (ll) {
                draft.la = +ll.lat.toFixed(5);
                draft.ln = +ll.lng.toFixed(5);
                reopen();
                toast("📍 位置已选好");
              },
              cancel: function () {
                /* 取消选点：把编辑框连同已填内容原样弹回，不丢数据 */
                reopen();
              },
            };
            $("pickbar").classList.add("on");
            try {
              snapTo(snapPeek);
            } catch (e) {}
          });
          $("pe-no").addEventListener("click", closeMask);
          if (!isNew)
            $("pe-del").addEventListener("click", function () {
              deletePlaceFlow(id);
            });
          $("pe-ok").addEventListener("click", function () {
            var v = grab();
            if (!v.n) {
              toast("「名称」还没填");
              return;
            }
            if (isNaN(v.la) || isNaN(v.ln)) {
              toast("还没有位置——填坐标或点「📍 地图选点」");
              return;
            }
            /* 锚点相关的改动一律二次确认：机票改签、酒店换店都是大事 */
            var wasAnchor = id && P[id] ? !!P[id].a : false;
            if (!isNew && (wasAnchor || v.a)) {
              var what =
                wasAnchor && !v.a
                  ? "取消它的锚点身份并保存"
                  : "修改这个锚点并保存";
              if (
                !confirm(
                  "⚠️ 「" +
                    (P[id] ? P[id].n : v.n) +
                    "」" +
                    (wasAnchor ? "是重要锚点" : "将成为重要锚点") +
                    "（机票 / 酒店 / 预约级）。\n确定要" +
                    what +
                    "吗？",
                )
              )
                return;
            }
            if (isNew && v.a) {
              if (
                !confirm(
                  "⚠️ 确认把「" +
                    v.n +
                    "」添加为重要锚点？\n它会钉死在当天行程里，之后的修改 / 删除都要再次确认。",
                )
              )
                return;
            }
            saveEditor(id, v, opt);
          });
        }
        function saveEditor(id, v, opt) {
          var isNew = !id;
          if (isNew) id = "u" + Date.now().toString(36);
          var old = P[id] || {};
          var np = {
            n: v.n,
            c: v.c,
            la: v.la,
            ln: v.ln,
            ar: v.ar || "自定义",
            d: v.d,
          };
          if (v.j) np.j = v.j;
          if (v.p) np.p = v.p;
          if (v.t) np.t = v.t;
          if (v.tr) np.tr = v.tr;
          if (v.bk) np.bk = v.bk;
          if (v.ph) np.ph = v.ph;
          if (v.a) np.a = 1;
          if (old.o) np.o = old.o;
          /* 系统推荐收编来的出处字段：编辑时静默保留 */
          if (old.pr) np.pr = old.pr;
          if (old.pa) np.pa = old.pa;
          if (old.ref) np.ref = old.ref;
          if (old.sy) np.sy = old.sy;
          P[id] = np;
          var day = dget((opt && opt.dayId) || cur);
          if (isNew && day) {
            if (opt.mode === "pool" && !v.a) {
              if (day.pool.indexOf(id) < 0) day.pool.push(id);
            } else {
              if (opt.mode === "pool" && v.a)
                toast("📌 锚点不进随缘池——已直接钉进 " + day.date);
              if (day.plan.indexOf(id) < 0) day.plan.push(id);
              if (!S.plans[day.id]) S.plans[day.id] = [];
              if (S.plans[day.id].indexOf(id) < 0) S.plans[day.id].push(id);
            }
          }
          closeMask({ force: true });
          save();
          renderAll();
          renderInfo();
          if (tab === "pool") renderPool();
          toast(
            isNew
              ? v.a
                ? "📌 锚点已钉进 " + (day ? day.date : "行程")
                : "✚ 已添加「" + esc(v.n) + "」"
              : "✎ 已保存修改",
          );
          if (sheetId === id) openSheet(id, { keep: true });
        }
        function deletePlaceFlow(id) {
          var p = P[id];
          if (!p) return;
          if (p.a) {
            if (
              !confirm(
                "⚠️ 「" +
                  p.n +
                  "」是重要锚点（机票 / 酒店 / 预约级）。\n真的要删除吗？",
              )
            )
              return;
            if (
              !confirm("再确认一次：删除锚点「" + p.n + "」？此操作不可恢复。")
            )
              return;
          } else {
            if (!confirm("删除「" + p.n + "」？会同时从行程和随缘池移除。"))
              return;
          }
          delete P[id];
          DAYS.forEach(function (d) {
            var i = d.plan.indexOf(id);
            if (i >= 0) d.plan.splice(i, 1);
            i = d.pool.indexOf(id);
            if (i >= 0) d.pool.splice(i, 1);
            var pl = S.plans[d.id];
            if (pl) {
              i = pl.indexOf(id);
              if (i >= 0) pl.splice(i, 1);
            }
          });
          delete S.done[id];
          if (focusId === id) focusId = null;
          closeMask({ force: true });
          if (sheetId === id) closeSheet();
          save();
          renderAll();
          renderInfo();
          if (tab === "pool") renderPool();
          toast("🗑 已删除「" + esc(p.n) + "」");
        }

        /* ---------- 同行人在线（Presence） ---------- */

        function mkHtml(inner, name, extra) {
          return (
            '<div class="mkwrap ' +
            (extra || "") +
            '">' +
            inner +
            '<div class="mk-lb">' +
            esc(name) +
            "</div></div>"
          );
        }
        function stampIcon(p, extra, t) {
          return L.divIcon({
            className: "",
            iconSize: [0, 0],
            html: mkHtml(
              '<div class="mk-stamp">' + esc(t || p.t || "★") + "</div>",

              extra,
            ),
          });

        function pinIcon(p, n, extra) {
          return L.divIcon({
            className: "",
            iconSize: [0, 0],

              '<div class="mk-pin"><span class="pn">' +

              extra,
            ),

        var mkIndex = {};
        function safeClear(g) {
          try {
            g.clearLayers();
          } catch (e) {
            try {
              g.eachLayer(function (l) {
                try {
                  g.removeLayer(l);
                } catch (_) {
                  /**/
                }
              });
            } catch (_) {
              /**/
            }
          }
        }
        function renderDay() {
          safeClear(layStops);
          safeClear(layRoute);
          mkIndex = {};
          var ids = visPlan(cur).filter(function (id) {
            return !P[id].o;
          });
          var pts = [],
            n = 0;
          ids.forEach(function (id) {
            var p = P[id];
            pts.push([p.la, p.ln]);
            var extra =
              (S.done[id] ? "is-done " : "") +
              (focusId === id ? "mk-focus" : "");
            var ic = p.a
              ? stampIcon(p, extra, stampT(id, cur))
              : (n++, pinIcon(p, n, extra));
            var mk = L.marker([p.la, p.ln], {
              icon: ic,
              keyboard: false,
            }).addTo(layStops);
            mkIndex[id] = mk;
            mk.on("click", function (e) {
              L.DomEvent.stopPropagation(e);
              focusStop(id, { spawn: true });
            });
          });
          if (pts.length > 1) {
            try {
              L.polyline(pts, {
                color: "#E0492E",
                weight: 3,
                opacity: 0.85,
                dashArray: "1 9",
                lineCap: "round",
              }).addTo(layRoute);
            } catch (e) {
              /* 渲染器不可用时静默降级 */
            }
          }
          return pts;
        }
        function fitDay(pts) {
          pts =
            pts ||
            visPlan(cur)
              .filter(function (id) {
                return !P[id].o;
              })
              .map(function (id) {
                return [P[id].la, P[id].ln];
              });
          if (!pts.length) return;
          var padB = Math.max(40, vh() - dTop + 26);
          if (pts.length === 1) {
            map.setView(pts[0], 15);
            return;
          }
          map.fitBounds(pts, {
            paddingTopLeft: [34, topH() + 18],
            paddingBottomRight: [34, padB],
            maxZoom: 16,
          });
        }
        function topH() {
          return $("daybar").offsetHeight || 70;
        }

        function flyOff(latlng, z, cb) {
          z = z == null ? Math.max(map.getZoom(), 15.5) : z;
          flying = true;
          var visH = Math.max(160, dTop - topH());
          var yWant = topH() + visH * 0.42;
          var c = map.project(L.latLng(latlng), z);
          c = L.point(c.x, c.y - yWant + vh() / 2);
          var done = false;
          function fin() {
            if (done) return;
            done = true;
            flying = false;
            if (cb) cb();
          }
          map.once("moveend", fin);
          try {
            map.flyTo(map.unproject(c, z), z, { duration: 0.55 });
          } catch (e) {}
          setTimeout(fin, 950);
        }

        /* 临时点（随缘池预览） */
        var tmpMk = null;

          tmpMk = L.marker([p.la, p.ln], {

        /* ==================================================================
         * 系统推荐（✨）—— 数据来自 window.PTPlaces（app/places-api.js）
         * 设计原则：
         *  · 未收编的推荐永远不进随缘池 tab、不进行程文档，只是「飘着的建议」
         *  · 用户点了「加入行程 / 收进随缘池」那一刻才 adoptRec() 落库，
         *    落库后带 sy:1 + ref，之后它就是用户自己的地点，可编辑可删除
         *  · 断网 / 没配 key / 接口挂了 → 界面静默降级，绝不打扰
         * ================================================================== */
        var SYSP = window.PTPlaces || null;
        var sysMem = {}; /* originId → 本次会话拉到的原始推荐列表 */

        function placePhotoSrc(p) {
          if (!p) return "";
          if (p.ph) return p.ph;
          if (p.pr && SYSP) return SYSP.photoUrl(p, 800);
          return "";
        }
        function fmtDist(m) {
          if (!isFinite(m)) return "";
          return m >= 1000
            ? (m / 1000).toFixed(1) + "km"
            : Math.max(10, Math.round(m / 10) * 10) + "m";
        }
        function isDupRec(rec) {
          for (var id in P) {
            var q = P[id];
            if (!q) continue;
            if (rec.ref && q.ref === rec.ref) return true;
            if (q.n && q.n === rec.n) return true;
            if (
              isFinite(q.la) &&
              isFinite(rec.la) &&
              dist(q, rec) < 40
            )
              return true;
          }
          return false;
        }
        function recsFor(baseId) {
          var p = P[baseId];
          if (!SYSP || !SYSP.enabled() || !p || !isFinite(p.la))
            return Promise.resolve([]);
          if (sysMem[baseId]) return Promise.resolve(sysMem[baseId]);
          return SYSP.nearby({ la: p.la, ln: p.ln, limit: 10 })
            .then(function (rs) {
              sysMem[baseId] = rs || [];
              return sysMem[baseId];
            })
            .catch(function () {
              return [];
            });
        }

        /* --- 详情卡里的「✨ 附近还可随缘 · 系统推荐」横滑区 --- */
        function loadSysNears(base, sheetPid) {
          var host = $("sys-near");
          if (!host) return;
          if (!SYSP || !SYSP.enabled() || !P[base]) {
            host.innerHTML = "";
            return;
          }
          host.innerHTML =
            '<div class="sys-h">✨ 附近还可随缘 · 系统推荐 <small>' +
            SYSP.providerName() +
            '</small></div><div class="nload">正在打听附近…</div>';
          recsFor(base).then(function (raw) {
            /* 卡片可能已经翻页/关闭，别往过期的 DOM 里塞东西 */
            if (!document.body.contains(host) || sheetId !== sheetPid) return;
            var recs = raw
              .filter(function (r) {
                return !isDupRec(r);
              })
              .slice(0, 6);
            if (!recs.length) {
              host.innerHTML = "";
              return;
            }
            var h =
              '<div class="sys-h">✨ 附近还可随缘 · 系统推荐 <small>' +
              SYSP.providerName() +

        /* --- 泡泡统一排版：直接落在地图位置附近，轻量避让，不做飞出动画 --- */
        function loadSystemBubbleRecs(originId) {
          if (!SYSP || !SYSP.enabled()) return Promise.resolve([]);

        function clampBubblePoint(pt) {
          pt.x = Math.max(46, Math.min(vw() - 46, pt.x));

          return pt;

        function bubblePointForItem(item, i) {
          var tp = null,
            src = item.kind === "sys" ? item.rec : P[item.id];

          return clampBubblePoint({ x: tp.x, y: tp.y - 8 });

        function relaxBubbleTargets(items, slots) {
          if (!slots.length) return slots;
          var raws = slots.map(function (s) {
            return { x: s.x, y: s.y };

          var seed = [
            [0, 0],
            [26, 0],
            [-26, 0],
            [0, -24],
            [0, 24],
            [22, -18],
            [-22, 18],
            [22, 18],
            [-22, -18],
          ];
          for (var i = 0; i < slots.length; i++) {
            var near = 0;
            for (var j = 0; j < i; j++) {
              if (
                Math.abs(raws[i].x - raws[j].x) < 36 &&
                Math.abs(raws[i].y - raws[j].y) < 28
              )
                near++;
            }
            if (near) {
              var off = seed[Math.min(near, seed.length - 1)];
              slots[i].x += off[0];
              slots[i].y += off[1];
            }
          }
          for (var iter = 0; iter < 28; iter++) {
            for (i = 0; i < slots.length; i++) {
              for (j = i + 1; j < slots.length; j++) {
                var dx = slots[j].x - slots[i].x,
                  dy = slots[j].y - slots[i].y,
                  ax = Math.abs(dx),
                  ay = Math.abs(dy),
                  minX =
                    items[i].kind === "sys" || items[j].kind === "sys"
                      ? 96
                      : 88,
                  minY =
                    items[i].kind === "sys" || items[j].kind === "sys"
                      ? 78
                      : 72;
                if (ax < minX && ay < minY) {
                  var sx = dx >= 0 ? 1 : -1,
                    sy = dy >= 0 ? 1 : -1,

        /* ---------- 随缘泡泡 ---------- */
        var bubHost = document.createElement("div");

        var bubbles = [],

              drawer.classList.remove("anim");
            }, 360);

        (function () {
          var g = $("grab"),
            sy = 0,

            lastY = 0,
            lastT = 0,
            vel = 0;
          g.addEventListener("pointerdown", function (e) {
            sy = e.clientY;
            st = dTop;
            moved = false;
            lastY = sy;
            lastT = Date.now();

            function mv(ev) {
              var dy = ev.clientY - sy;
              if (Math.abs(dy) > 6) moved = true;
              var now = Date.now();
              if (now - lastT > 0) {
                vel = (ev.clientY - lastY) / (now - lastT);
                lastY = ev.clientY;
                lastT = now;

              if (moved) {
                setDrawer(st + dy, false);
                dismissBubbles();

              document.removeEventListener("pointermove", mv);
              document.removeEventListener("pointerup", up);
              document.removeEventListener("pointercancel", up);

                window.__grabTap = Date.now();

                var i = 0,
                  best = 1e9;
                order.forEach(function (o, k) {
                  var d = Math.abs(o - dTop);
                  if (d < best) {
                    best = d;
                    i = k;
                  }
                });
                if (vel > 0 && i < 2) i++;
                else if (vel < 0 && i > 0) i--;
                target = order[i];
              } else {
                var arr = [snapFull, snapHalf, snapPeek];
                target = arr[0];
                var bd = 1e9;
                arr.forEach(function (o) {
                  var d = Math.abs(o - dTop);

            document.removeEventListener("pointerup", up);
            document.removeEventListener("pointercancel", up);
            ghost.remove();
            var newIdx = 0,
              node = list.firstChild;
            while (node && node !== ph) {
              if (
                node.classList &&
                node.classList.contains("card") &&
                node !== card
              )
                newIdx++;
              node = node.nextSibling;
            }
            var plan = S.plans[cur];
            var vis = visPlan(cur);
            var targetId = vis[newIdx];
            var old = plan.indexOf(id);
            plan.splice(old, 1);
            var ins =
              targetId === undefined
                ? plan.length
                : targetId === id
                  ? old
                  : plan.indexOf(targetId);
            if (ins < 0) ins = plan.length;
            plan.splice(ins, 0, id);
            save();
            renderAll();
          }
          document.addEventListener("pointermove", mv);
          document.addEventListener("pointerup", up);
          document.addEventListener("pointercancel", up);
        }

              toast("解析失败：这不是有效的 JSON");
              return;

            if (!j || !j.P || !j.DAYS) {

            try {

            toast(
              "✅ 已导入" +

        /* ---------- AI 旅行搭子 v6：能聊天的搭子（预览制，不自动改行程）----------
         * 真接 Mimo：走 PTAI.chat() → AI_ENDPOINT（服务端转发，token 永不进前端）。
         * 未接入时用本地演示逻辑，交互完全一致。 */
        var aiMsgs = []; /* {role:"user"|"assistant", content} 发给服务端的对话历史 */
        var aiRecStore = {}; /* key → rec，聊天流里所有可落库的卡片 */
        var aiRecSeq = 0;
        var aiBusy = false;
        var aiFabPos = { x: null, y: null };
        var aiFabLoop = 0,
          aiEyeRAF = 0;
        function aiFabBounds() {
          var fab = $("aiFab");
          var w = fab ? fab.offsetWidth || 44 : 44;
          var h = fab ? fab.offsetHeight || 44 : 44;
          return {
            minX: 10,
            maxX: Math.max(10, vw() - w - 10),
            minY: topH() + 12,
            maxY: Math.max(topH() + 12, dTop - h - 12),
          };
        }
        function syncAIFab(forceDefault) {
          var fab = $("aiFab");
          if (!fab) return;
          var bd = aiFabBounds();
          if (aiFabPos.x == null || aiFabPos.y == null || forceDefault) {
            aiFabPos.x = bd.maxX;
            aiFabPos.y = Math.max(
              bd.minY,
              Math.min(bd.maxY, dTop - (fab.offsetHeight || 44) - 14),
            );
          }
          aiFabPos.x = Math.max(bd.minX, Math.min(bd.maxX, aiFabPos.x));
          aiFabPos.y = Math.max(bd.minY, Math.min(bd.maxY, aiFabPos.y));
          fab.style.left = aiFabPos.x + "px";
          fab.style.top = aiFabPos.y + "px";
          fab.style.right = "auto";
          fab.style.bottom = "auto";
        }
        function keepAIFabFloating() {
          syncAIFab(false);
          aiFabLoop = requestAnimationFrame(keepAIFabFloating);
        }
        function setAIFaceLook(nx, ny) {
          var fab = $("aiFab");
          if (!fab) return;
          nx = Math.max(-1, Math.min(1, nx || 0));
          ny = Math.max(-1, Math.min(1, ny || 0));
          fab.style.setProperty("--eye-x", (nx * 2.2).toFixed(2) + "px");
          fab.style.setProperty("--eye-y", (ny * 1.6).toFixed(2) + "px");
        }
        function lookAIFab(clientX, clientY) {
          var fab = $("aiFab");
          if (!fab) return;
          var r = fab.getBoundingClientRect(),
            cx = r.left + r.width / 2,
            cy = r.top + r.height / 2,
            dx = clientX - cx,
            dy = clientY - cy,
            d = Math.sqrt(dx * dx + dy * dy) || 1;
          setAIFaceLook(dx / d, dy / d);
        }
        /* 眼睛状态：思考=左右扫，回复=亮一下 */
        function aiFace(state) {
          var fab = $("aiFab");
          if (!fab) return;
          fab.classList.toggle("think", state === "think");

        }
        function aiBasePlace() {
          var plan = (S.plans && S.plans[cur]) || [];
          if (focusId && P[focusId]) return P[focusId];
          if (plan.length && P[plan[0]]) return P[plan[0]];
          var center = map.getCenter();
          return {
            n: dget(cur).title || "今天",
            c: "spot",
            la: center.lat,
            ln: center.lng,
            ar: dget(cur).date || "当前地图",
            d: "AI 建议基准点",
          };
        }
        /* ---- 聊天渲染 ---- */
        function aiScroll() {
          var c = $("aiChat");
          c.scrollTop = c.scrollHeight;
        }
        function aiBubble(role, text) {
          var d = document.createElement("div");
          d.className = "ai-msg " + (role === "user" ? "me" : "bot");
          d.textContent = text;
          $("aiChat").appendChild(d);
          aiScroll();
          return d;
        }
        function aiWelcome() {
          aiBubble("assistant", "今天想怎么晃？可以直接跟我聊，也可以点下面直接开始👇");
          var w = document.createElement("div");
          w.className = "ai-starters";
          [
            "🧭 给我一条半日轻量路线",
            "🌧️ 生成一条雨天备用路线",
            "🎌 二次元 / 买谷子优先怎么逛",
            "⏱️ 当前地点附近 90 分钟怎么晃",
          ].forEach(function (t) {
            var b = document.createElement("button");
            b.type = "button";
            b.textContent = t;
            b.onclick = function () {
              aiSend(t.replace(/^\S+\s/, ""));
            };
            w.appendChild(b);
          });
          $("aiChat").appendChild(w);
          aiScroll();
        }
        function aiRegRec(rec) {
          var k = "r" + ++aiRecSeq;
          aiRecStore[k] = rec;
          return k;
        }
        function aiCardEl(rec) {
          var k = aiRegRec(rec);
          var c = CAT[rec.c] || CAT.spot;
          var d = document.createElement("div");
          d.className = "ai-card";
          d.innerHTML =
            "<h4>" +
            c.em +
            " " +
            esc(rec.n) +
            "</h4><p>" +
            esc(rec.d || rec.ar || "") +
            '</p><div class="ai-actions">' +
            '<button type="button" data-ai-act="pool" data-ai-k="' +
            k +
            '">🎐 收进随缘池</button>' +
            '<button type="button" data-ai-act="plan" data-ai-k="' +
            k +
            '">✚ 加入今日</button></div>';
          return d;
        }
        /* 整条路线预览卡：AI 可以给半日路线/雨天备用等复杂编排，仍然先预览 */
        function aiRouteEl(route) {
          var keys = route.recs.map(aiRegRec);
          var d = document.createElement("div");
          d.className = "ai-route";
          var h = "<h4>🧭 " + esc(route.title || "路线预览") + "</h4>";
          route.recs.forEach(function (r, i) {
            var c = CAT[r.c] || CAT.spot;
            h +=
              '<div class="rt-stop"><span class="rt-n">' +
              (i + 1) +
              "</span><span>" +
              c.em +
              " " +
              esc(r.n) +
              "<small>" +
              esc(r.d || r.ar || "") +
              "</small></span></div>";
          });
          h +=
            '<div class="ai-actions">' +
            '<button type="button" data-ai-route="pool" data-ai-ks="' +
            keys.join(",") +
            '">🎐 整条收进随缘池</button>' +
            '<button type="button" data-ai-act="plan" data-ai-route="plan" data-ai-ks="' +
            keys.join(",") +
            '">✚ 整条加入今日</button></div>';
          d.innerHTML = h;
          return d;
        }
        /* ---- 演示逻辑（未接 AI_ENDPOINT 时）---- */
        function aiDemoTemplates(txt, prefs) {
          function has(kw) {
            return txt.indexOf(kw) >= 0 || prefs.indexOf(kw) >= 0;
          }
          if (has("二次元") || has("动漫") || has("谷子"))
            return [
              ["shop", "中古谷子小店", "顺路淘一点老番周边，不当硬任务。"],
              ["fun", "街机游戏房", "逛累了投几个硬币，二次元浓度补一下。"],
              ["photo", "动画感街角机位", "不用排队，路过顺手拍两张就撤。"],
            ];
          if (has("购物"))
            return [
              ["shop", "纸品杂货店", "手账、明信片、小礼物一次解决。"],
              ["sweet", "商场里侧甜品铺", "室内动线友好，中场回血点。"],
              ["spot", "屋顶小展望位", "购物中间上去透气，不费脚。"],
            ];
          if (has("雨天") || has("下雨"))
            return [
              ["sweet", "雨天咖啡避难所", "靠近主路线，雨大直接切进去。"],
              ["spot", "室内小展馆", "不用暴走，替换户外点刚好。"],
              ["shop", "地下街顺路店", "从车站动线过去最稳。"],
            ];
          if (has("少打卡") || has("随意逛") || has("轻松") || has("不赶"))
            return [
              ["sweet", "慢悠悠咖啡站", "给脚和脑子都留一点空白。"],
              ["photo", "安静街口", "路过就拍，不专门绕路。"],
              ["eat", "轻量晚餐候补", "不想排队时的保险选项。"],
            ];
          return [
            ["eat", "顺路小食堂", "离当前路线近，不确定时的备选。"],
            ["sweet", "回血甜品点", "逛到一半可以坐一下。"],
            ["photo", "附近拍照点", "看到有感觉再去，不焦虑。"],
          ];
        }
        function aiDemoRecs(txt, prefs) {
          var base = aiBasePlace();
          return aiDemoTemplates(txt, prefs).map(function (t, i) {
            return {
              ref: "ai-demo:" + Date.now() + ":" + i,
              n: t[1],
              c: t[0],
              la: base.la + (i % 2 ? 1 : -1) * 0.001,
              ln: base.ln + (i - 1) * 0.0012,
              ar: base.ar || "AI 演示",
              d: t[2],
              p: "AI 草稿",
              ai: 1,
            };
          });
        }
        function aiDemoReply(txt, prefs) {
          var wantsRoute =
            /路线|半日|一天|90|安排|备用|怎么逛|怎么晃|规划/.test(txt);
          var recs = aiDemoRecs(txt, prefs);
          var reply, route = null;
          if (wantsRoute) {
            var title = /雨/.test(txt)
              ? "雨天备用 · 轻量路线"
              : /90/.test(txt)
                ? "附近 90 分钟顺路小圈"
                : /二次元|谷子|动漫/.test(txt)
                  ? "二次元优先 · 半日路线"
                  : "轻量半日路线";
            route = { title: title, recs: recs };
            reply =
              "可以，我按「" +
              (prefs.length ? prefs.join("、") : "不累人") +
              "」给你搭了一条，先看预览——不会动你现在的行程：";
          } else {
            reply = "这附近我给你挑了几个随缘选项，看看有没有想收的：";
          }
          return { reply: reply, recs: wantsRoute ? [] : recs, route: route };
        }
        /* ---- 服务端响应 → 卡片 ---- */
        function aiRecsFromP(Pobj) {
          var arr = [];
          if (!Pobj) return arr;
          for (var id in Pobj) {
            var p = Pobj[id];
            if (!p || !p.n || !isFinite(p.la) || !isFinite(p.ln)) continue;
            arr.push({
              ref: p.ref || "ai:" + id,
              _id: id,
              n: p.n,
              c: CAT[p.c] ? p.c : "spot",
              la: p.la,
              ln: p.ln,
              ar: p.ar || "AI 建议",
              d: p.d || "",
              p: p.p || "AI 建议",
              t: p.t,
              ai: 1,
            });
          }
          return arr.slice(0, 10);
        }
        function aiRenderResponse(j, fallbackTxt, prefs) {
          var chat = $("aiChat");
          if (j && j.reply) aiBubble("assistant", j.reply);
          else if (j && j.note) aiBubble("assistant", j.note);
          var recs = aiRecsFromP(j && j.P);
          /* 服务端可给 route: {title, ids:[P 里的 key 顺序]} → 整条路线预览 */
          if (j && j.route && j.route.ids && recs.length) {
            var byId = {};
            recs.forEach(function (r) {
              byId[r._id] = r;
            });
            var rr = j.route.ids
              .map(function (i) {
                return byId[i];
              })
              .filter(Boolean);
            if (rr.length) {
              chat.appendChild(aiRouteEl({ title: j.route.title, recs: rr }));
              aiScroll();
              return;
            }
          }
          if (recs.length) {
            recs.forEach(function (r) {
              chat.appendChild(aiCardEl(r));
            });
            aiScroll();
            return;
          }
          if (!j || (!j.reply && !j.note)) {
            /* 结构对不上：退回演示，交互不断 */
            var demo = aiDemoReply(fallbackTxt, prefs);
            aiBubble("assistant", demo.reply);
            if (demo.route) chat.appendChild(aiRouteEl(demo.route));
            else
              demo.recs.forEach(function (r) {
                chat.appendChild(aiCardEl(r));
              });
            aiScroll();
          }
        }
        /* ---- 落库（只有用户点了按钮才发生）---- */
        function adoptAIRec(rec) {
          for (var ex in P) {
            if (rec.ref && P[ex] && P[ex].ref === rec.ref) return ex;
          }
          var id =
            "ai" +
            Date.now().toString(36) +
            Math.floor(Math.random() * 36).toString(36);
          var np = {
            n: rec.n,
            c: CAT[rec.c] ? rec.c : "spot",
            la: rec.la,
            ln: rec.ln,
            ar: rec.ar || "AI 建议",
            d: rec.d || "",
            p: rec.p || "AI 建议",
            ref: rec.ref,
            ai: 1,
          };
          if (rec.t) np.t = rec.t;
          P[id] = np;
          return id;
        }
        function aiAdoptOne(rec, mode) {
          var id = adoptAIRec(rec);
          var day = dget(cur);
          if (mode === "plan") {
            if (S.plans[day.id].indexOf(id) < 0) addToPlan(id, null, day.id);
            return id;
          }
          if (day.pool.indexOf(id) < 0 && S.plans[day.id].indexOf(id) < 0)
            day.pool.push(id);
          return id;
        }
        /* ---- 发送 ---- */
        function aiSend(text) {
          text = String(text || "").trim();
          if (!text || aiBusy) return;
          aiBusy = true;
          $("aiSend").disabled = true;
          $("aiWish").value = "";
          aiBubble("user", text);
          var thinking = aiBubble("assistant", "想想…");
          thinking.classList.add("thinking");
          aiFace("think");
          var prefs = aiPrefs();
          var sendTxt =
            text + (prefs.length ? "\n偏好：" + prefs.join("、") : "");
          aiMsgs.push({ role: "user", content: sendTxt });
          function finish() {
            thinking.remove();
            aiFace("ping");
            aiBusy = false;
            $("aiSend").disabled = false;
          }
          if (window.PTAI && PTAI.enabled()) {
            PTAI.chat({
              messages: aiMsgs.slice(-12),
              doc: { P: P, DAYS: DAYS, RES: RES, LANG: LANG, S: S },
            })
              .then(function (j) {
                finish();
                if (j && (j.reply || j.note))
                  aiMsgs.push({
                    role: "assistant",
                    content: j.reply || j.note,
                  });
                aiRenderResponse(j, sendTxt, prefs);
              })
              .catch(function () {
                finish();
                aiBubble(
                  "assistant",
                  "AI 服务暂时没接通，我先用本地演示给你搭一版（记得把 Mimo token 放服务端转发，别放前端）：",
                );
                var demo = aiDemoReply(sendTxt, prefs);
                if (demo.route) $("aiChat").appendChild(aiRouteEl(demo.route));
                else
                  demo.recs.forEach(function (r) {
                    $("aiChat").appendChild(aiCardEl(r));
                  });
                aiScroll();
              });
          } else {
            setTimeout(function () {
              finish();
              var demo = aiDemoReply(sendTxt, prefs);
              aiMsgs.push({ role: "assistant", content: demo.reply });
              aiBubble("assistant", demo.reply);
              if (demo.route) $("aiChat").appendChild(aiRouteEl(demo.route));
              else
                demo.recs.forEach(function (r) {
                  $("aiChat").appendChild(aiCardEl(r));
                });
              aiScroll();
            }, 520 + Math.random() * 400);
          }
        }
        function initAI() {
          var fab = $("aiFab");
          if (!fab) return;
          syncAIFab(true);
          if (!aiFabLoop) keepAIFabFloating();
          /* 眼睛跟随所有指针操作——包括拖动泡泡时 */
          document.addEventListener(
            "pointermove",
            function (e) {
              var x = e.clientX,
                y = e.clientY;
              if (aiEyeRAF) cancelAnimationFrame(aiEyeRAF);
              aiEyeRAF = requestAnimationFrame(function () {
                aiEyeRAF = 0;
                lookAIFab(x, y);
              });
            },
            { passive: true },
          );
          fab.addEventListener("pointerdown", function (e) {
            e.preventDefault();
            var sx = e.clientX,
              sy = e.clientY,
              x0 = aiFabPos.x,
              y0 = aiFabPos.y,
              moved = false;
            try {
              fab.setPointerCapture(e.pointerId);
            } catch (err) {}
            function mv(ev) {
              var dx = ev.clientX - sx,
                dy = ev.clientY - sy;
              if (!moved && dx * dx + dy * dy > 64) {
                moved = true;
                fab.classList.add("dragging");
              }
              if (!moved) return;
              var bd = aiFabBounds();
              aiFabPos.x = Math.max(bd.minX, Math.min(bd.maxX, x0 + dx));
              aiFabPos.y = Math.max(bd.minY, Math.min(bd.maxY, y0 + dy));
              syncAIFab(false);
            }
            function up() {
              fab.removeEventListener("pointermove", mv);
              fab.removeEventListener("pointerup", up);
              fab.removeEventListener("pointercancel", up);
              fab.classList.remove("dragging");
              if (!moved) toggleAI();
            }
            fab.addEventListener("pointermove", mv);
            fab.addEventListener("pointerup", up);
            fab.addEventListener("pointercancel", up);
          });
          $("aiClose").addEventListener("click", function () {
            setAI(false);
          });
          $("aiPrefs").addEventListener("click", function (e) {
            var b = e.target.closest
              ? e.target.closest("button[data-pref]")
              : null;
            if (!b) return;
            b.classList.toggle("on");
          });
          $("aiSend").addEventListener("click", function () {
            aiSend($("aiWish").value);
          });
          $("aiWish").addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
              e.preventDefault();
              aiSend(this.value);
            }
          });
          /* 卡片按钮：单点落库 / 整条路线落库（用户确认才动行程）*/
          $("aiChat").addEventListener("click", function (e) {
            var b = e.target.closest
              ? e.target.closest("button[data-ai-act],button[data-ai-route]")
              : null;
            if (!b || b.disabled) return;
            var ks = b.getAttribute("data-ai-ks");
            if (ks) {
              var mode = b.getAttribute("data-ai-route");
              var n = 0;
              ks.split(",").forEach(function (k) {
                if (aiRecStore[k]) {
                  aiAdoptOne(aiRecStore[k], mode);
                  n++;
                }
              });
              save();
              renderAll();
              if (tab === "pool") renderPool();
              b.disabled = true;
              toast(
                mode === "plan"
                  ? "✚ 整条路线已加入今日（" + n + " 站）"
                  : "🎐 " + n + " 个点已收进随缘池",
              );
              return;
            }
            var k = b.getAttribute("data-ai-k");
            var rec = aiRecStore[k];
            if (!rec) return;
            var mode2 = b.getAttribute("data-ai-act");
            aiAdoptOne(rec, mode2);
            save();
            renderAll();
            if (tab === "pool") renderPool();
            b.disabled = true;
            toast(
              mode2 === "plan"
                ? "✚ 已加入今日 · " + esc(rec.n)
                : "🎐 已收进随缘池 · " + esc(rec.n),
            );
          });
        }
        initAI();

        /* ---------- 右侧按钮 ---------- */
        $("btnFit").addEventListener("click", function () {
          dismissBubbles();
          fitDay();
        });
        $("btnLoc").addEventListener("click", function () {
          if (!navigator.geolocation) {
            toast("设备不支持定位");
            return;
          }
          toast("📍 定位中…");
          navigator.geolocation.getCurrentPosition(
            function (pos) {
              safeClear(layMe);
              var ll = [pos.coords.latitude, pos.coords.longitude];
              L.marker(ll, {
                icon: L.divIcon({
                  className: "",
                  iconSize: [0, 0],
                  html: '<div class="mkwrap"><div class="mk-me"></div><div class="mk-lb">我在这</div></div>',
                }),
                keyboard: false,
              }).addTo(layMe);
              flyOff(ll, 15.5);
            },
            function () {
              toast("定位失败——请检查系统定位权限");
            },
            { enableHighAccuracy: true, timeout: 8000 },
          );
        });

        /* ---------- 引导 ---------- */
        $("hintok").addEventListener("click", function () {
          $("hint").classList.remove("on");
          S.coach = true;
          save();
        });

        /* ---------- 总渲染 ---------- */
        function renderAll() {
          renderDaybar();
          renderPlan();
          if (tab === "pool") renderPool();
          var pts = renderDay();
          return pts;
        }

        /* ---------- init ---------- */
        calcSnaps();
        setDrawer(snapHalf, false);
        renderSay();
        renderInfo();
        var pts0 = renderAll();
        setTab("plan");
        setTimeout(function () {
          map.invalidateSize();
          fitDay(pts0);
        }, 80);
        if (!S.coach)
          setTimeout(function () {
            $("hint").classList.add("on");
          }, 600);
        window.addEventListener("resize", function () {
          var ratio = (dTop - snapFull) / Math.max(1, snapPeek - snapFull);
          calcSnaps();
          var arr = [snapFull, snapHalf, snapPeek];
          var t = ratio < 0.25 ? snapFull : ratio < 0.75 ? snapHalf : snapPeek;
          setDrawer(t, false);
          map.invalidateSize();
        });

        /* ==== 口袋旅行：应用一份完整行程文档（本地缓存 / 云端同步下来的） ==== */
        function PT_applyDoc(doc) {
          if (!doc || !doc.P || !doc.DAYS) return;
          P = doc.P;
          DAYS = doc.DAYS;
          if (doc.RES) RES = doc.RES;
          if (doc.LANG !== undefined) {
            LANG = doc.LANG;
            renderSay();
          }
          if (doc.S && doc.S.plans) {
            S = doc.S;
            if (!S.done) S.done = {};
            if (!S.sw || typeof S.sw !== "object") S.sw = {};
            if (S.nav !== "yahoo") S.nav = "google";
          }
          DAYS.forEach(function (d) {
            if (!S.plans[d.id]) S.plans[d.id] = d.plan.slice();
            S.plans[d.id] = S.plans[d.id].filter(function (id) {
              return P[id];
            });
          });
          renderInfo();
          var pts = renderAll();
          setTimeout(function () {
            try {
              map.invalidateSize();
              fitDay(pts);
            } catch (e) {}
          }, 60);
        }
        window.PT_applyDoc = PT_applyDoc;
        window.renderPresence =
          renderPresence; /* 同 PT_applyDoc：暴露给外部（调试/测试）*/
        /* 订阅：初次用最新版覆盖本地占位（好友新设备打开共享行程时）；
           之后同行实时编辑会推送过来自动刷新。本地模式下 connect 是空操作。
           关键：必须等 _ptReady（后端/会话就绪）后再 connect，否则云端 sb 尚未建立，
           loadDoc 会抛错被吞掉，导致共享行程只显示示例数据。 */
        function startSync() {
          if (!(window.PT && PT.connect)) return;
          try {
            PT.connect(_tripId, {
              onRemote: function (doc, info) {
                PT_applyDoc(doc);
                if (info && !info.initial) toast("↻ 行程已被同行更新");
              },
              onPresence: renderPresence,
              onError: function (err) {
                /* 本地已有缓存就静默（离线也能用）；否则说明这份云端行程读不到 */
                if (window.PT && PT.loadDocSync && PT.loadDocSync(_tripId))
                  return;
                var msg = (err && err.message) || "";
                toast(
                  /row|PGRST|permission|policy/i.test(msg)
                    ? "读取这份行程失败：可能未加入或无权限"
                    : "行程同步失败，请检查网络后重试",
                );
              },
            });
          } catch (e) {}
        }
        _ptReady.then(function () {
          /* 云端模式下没有登录会话就读不了云端行程；本机也没缓存时回首页登录 */
          if (
            window.PT &&
            PT.isCloud &&
            PT.isCloud() &&
            !PT.getUser() &&
            !(PT.loadDocSync && PT.loadDocSync(_tripId))
          ) {
            location.replace("index.html");
            return;
          }
          startSync();
        }, startSync);
      })();
    </script>
  </body>
