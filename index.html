<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#e7ded0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>口袋旅行</title>
    <style>
      :root {
        --ink: #1b2530;
        --ink2: #5a6875;
        --ink3: #8a94a0;
        --paper: #f4f1e9;
        --paper2: #ece6d9;
        --verm: #e0492e;
        --verm-d: #b8371f;
        --blue: #3e7bd6;
        --gold: #c9a24b;
        --line: rgba(27, 37, 48, 0.1);
        --gl-bg: linear-gradient(
          160deg,
          rgba(255, 255, 255, 0.78),
          rgba(255, 255, 255, 0.5)
        );
        --gl-bd: rgba(255, 255, 255, 0.8);
        --shadow: 0 10px 34px rgba(23, 34, 51, 0.16),
          0 2px 8px rgba(23, 34, 51, 0.09);
        --sa-t: env(safe-area-inset-top, 0px);
        --sa-b: env(safe-area-inset-bottom, 0px);
        --serif: "Songti SC", "Hiragino Mincho ProN", "Noto Serif CJK SC",
          Georgia, "Times New Roman", serif;
        --sans: -apple-system, BlinkMacSystemFont, "PingFang SC",
          "Hiragino Sans", "Noto Sans CJK SC", "Segoe UI", sans-serif;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: var(--sans);
        color: var(--ink);
        background: var(--paper);
        background-image: radial-gradient(
            120% 80% at 85% -10%,
            #fbf9f4 0%,
            rgba(251, 249, 244, 0) 55%
          ),
          radial-gradient(
            90% 60% at 0% 105%,
            rgba(224, 73, 46, 0.06) 0%,
            rgba(224, 73, 46, 0) 60%
          ),
          repeating-linear-gradient(
            26deg,
            rgba(27, 37, 48, 0.014) 0 2px,
            rgba(27, 37, 48, 0) 2px 22px
          );
        -webkit-font-smoothing: antialiased;
        min-height: 100%;
      }
      button {
        font: inherit;
        color: inherit;
        background: none;
        border: 0;
        cursor: pointer;
      }
      input {
        font: inherit;
      }
      .wrap {
        max-width: 640px;
        margin: 0 auto;
        padding: calc(var(--sa-t) + 20px) 18px calc(var(--sa-b) + 120px);
      }

      /* ---------- 页眉 ---------- */
      header.top {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 12px;
        margin: 6px 2px 22px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .seal {
        width: 46px;
        height: 46px;
        flex: 0 0 auto;
        border-radius: 12px;
        border: 2px solid var(--verm);
        color: var(--verm);
        display: grid;
        place-items: center;
        font-family: var(--serif);
        font-size: 22px;
        font-weight: 700;
        transform: rotate(-4deg);
        box-shadow: inset 0 0 0 1px rgba(224, 73, 46, 0.25);
        background: rgba(224, 73, 46, 0.05);
      }
      .brand h1 {
        font-family: var(--serif);
        font-size: 27px;
        letter-spacing: 2px;
        font-weight: 700;
        line-height: 1;
      }
      .brand p {
        font-size: 11.5px;
        color: var(--ink3);
        letter-spacing: 3px;
        margin-top: 5px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 7px 12px;
        border-radius: 999px;
        background: var(--gl-bg);
        border: 1px solid var(--gl-bd);
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        box-shadow: 0 3px 12px rgba(23, 34, 51, 0.08);
        font-size: 13px;
        color: var(--ink2);
        white-space: nowrap;
      }
      .chip .av {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--verm);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 12px;
        font-weight: 700;
      }

      /* ---------- 段标题 ---------- */
      .eyebrow {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 4px 2px 14px;
        color: var(--ink3);
        font-size: 12px;
        letter-spacing: 3px;
      }
      .eyebrow::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--line);
      }

      /* ---------- 行程卡（护照/行李牌） ---------- */
      .cards {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .tag {
        position: relative;
        display: flex;
        align-items: stretch;
        gap: 14px;
        padding: 16px 16px 16px 18px;
        border-radius: 18px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.9),
          rgba(255, 255, 255, 0.72)
        );
        border: 1px solid var(--gl-bd);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px) saturate(150%);
        -webkit-backdrop-filter: blur(16px) saturate(150%);
        overflow: hidden;
        transition: transform 0.16s ease, box-shadow 0.16s ease;
      }
      .tag:active {
        transform: scale(0.985);
      }
      /* 行李牌左侧的打孔与朱线 */
      .tag::before {
        content: "";
        position: absolute;
        left: 8px;
        top: 50%;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--paper2);
        box-shadow: inset 0 0 0 1.5px rgba(27, 37, 48, 0.18);
        transform: translateY(-50%);
      }
      .tag .emoji {
        flex: 0 0 auto;
        width: 58px;
        height: 58px;
        margin-left: 6px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        font-size: 30px;
        background: var(--paper);
        border: 1px dashed rgba(27, 37, 48, 0.18);
        align-self: center;
      }
      .tag .body {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
      }
      .tag .ttl {
        font-family: var(--serif);
        font-size: 19px;
        font-weight: 700;
        letter-spacing: 0.5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tag .meta {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        font-size: 12px;
        color: var(--ink3);
      }
      .rolechip {
        font-size: 10.5px;
        letter-spacing: 0.5px;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid currentColor;
      }
      .rolechip.own {
        color: var(--verm);
      }
      .rolechip.shared {
        color: var(--blue);
      }
      .tag .more {
        flex: 0 0 auto;
        align-self: center;
        width: 34px;
        height: 34px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        color: var(--ink3);
        font-size: 18px;
      }
      .tag .more:active {
        background: rgba(27, 37, 48, 0.06);
      }
      /* 已浏览印记 */
      .tag .stamp {
        position: absolute;
        right: 42px;
        bottom: 8px;
        font-size: 9px;
        letter-spacing: 1px;
        color: rgba(224, 73, 46, 0.5);
        border: 1px solid rgba(224, 73, 46, 0.35);
        border-radius: 5px;
        padding: 1px 5px;
        transform: rotate(-6deg);
        pointer-events: none;
      }

      /* 信息更丰富的行李牌 + 倾斜封面照 */
      .tag.rich {
        padding: 15px 15px 15px 24px;
      }
      .tag.rich .body {
        gap: 7px;
      }
      .tag .stats {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        font-size: 12.5px;
        font-weight: 600;
        color: var(--ink2);
      }
      .tag .stats .st {
        display: inline-flex;
        align-items: center;
        gap: 3px;
      }
      .tag .cover {
        flex: 0 0 auto;
        width: 98px;
        height: 76px;
        align-self: center;
        border-radius: 12px;
        background-size: cover;
        background-position: center;
        border: 3px solid #fff;
        box-shadow: 0 7px 18px rgba(23, 34, 51, 0.2);
        transform: rotate(5deg);
        transition: transform 0.18s ease;
      }
      .tag.rich:active .cover {
        transform: rotate(3deg) scale(0.98);
      }
      .tag .cover.ph {
        display: grid;
        place-items: center;
        font-size: 34px;
        background: linear-gradient(150deg, #fbeee0, #e7dac4);
        border-color: rgba(255, 255, 255, 0.9);
      }
      .tag.rich .more {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 30px;
        height: 30px;
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        z-index: 2;
      }

      /* 新建卡 */
      .tag.new {
        justify-content: center;
        align-items: center;
        gap: 10px;
        border: 1.5px dashed rgba(27, 37, 48, 0.22);
        background: rgba(255, 255, 255, 0.4);
        box-shadow: none;
        color: var(--ink2);
        font-size: 15px;
        padding: 20px;
      }
      .tag.new::before {
        display: none;
      }
      .tag.new b {
        font-family: var(--serif);
        font-weight: 700;
      }

      /* 空状态 */
      .empty {
        text-align: center;
        padding: 40px 20px;
        color: var(--ink2);
      }
      .empty .big {
        font-size: 40px;
        margin-bottom: 10px;
        opacity: 0.6;
      }
      .empty p {
        font-size: 14px;
        line-height: 1.7;
      }

      /* ---------- 底部操作条 ---------- */
      .dock {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 12px 16px calc(var(--sa-b) + 12px);
        display: flex;
        gap: 10px;
        max-width: 640px;
        margin: 0 auto;
        z-index: 40;
        background: linear-gradient(
          180deg,
          rgba(244, 241, 233, 0) 0%,
          rgba(244, 241, 233, 0.85) 40%,
          var(--paper) 100%
        );
      }
      .btn {
        flex: 1;
        height: 50px;
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.5px;
        border: 1px solid var(--gl-bd);
        background: var(--gl-bg);
        backdrop-filter: blur(16px) saturate(160%);
        -webkit-backdrop-filter: blur(16px) saturate(160%);
        box-shadow: 0 6px 18px rgba(23, 34, 51, 0.12);
        color: var(--ink);
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn.primary {
        background: linear-gradient(180deg, #ef5a3f, var(--verm));
        color: #fff;
        border-color: rgba(255, 255, 255, 0.3);
        box-shadow: 0 8px 22px rgba(224, 73, 46, 0.34);
      }

      /* ---------- 登录 ---------- */
      .auth {
        max-width: 400px;
        margin: 6vh auto 0;
        padding: 0 6px;
        text-align: center;
      }
      .auth .seal {
        width: 62px;
        height: 62px;
        font-size: 30px;
        margin: 0 auto 18px;
        border-radius: 16px;
      }
      .auth h2 {
        font-family: var(--serif);
        font-size: 26px;
        letter-spacing: 2px;
        margin-bottom: 6px;
      }
      .auth .sub {
        color: var(--ink3);
        font-size: 13px;
        margin-bottom: 26px;
      }
      .card {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.92),
          rgba(255, 255, 255, 0.78)
        );
        border: 1px solid var(--gl-bd);
        border-radius: 20px;
        box-shadow: var(--shadow);
        padding: 22px 20px;
        text-align: left;
      }
      .field {
        margin-bottom: 14px;
      }
      .field label {
        display: block;
        font-size: 12px;
        color: var(--ink3);
        letter-spacing: 1px;
        margin: 0 0 6px 2px;
      }
      .field input {
        width: 100%;
        height: 46px;
        padding: 0 14px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: var(--paper);
        color: var(--ink);
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      .field input:focus {
        border-color: var(--verm);
        box-shadow: 0 0 0 3px rgba(224, 73, 46, 0.13);
      }
      .tabs {
        display: flex;
        background: var(--paper2);
        border-radius: 12px;
        padding: 4px;
        margin-bottom: 20px;
      }
      .tabs button {
        flex: 1;
        height: 38px;
        border-radius: 9px;
        font-size: 14px;
        font-weight: 600;
        color: var(--ink2);
      }
      .tabs button.on {
        background: #fff;
        color: var(--ink);
        box-shadow: 0 2px 6px rgba(23, 34, 51, 0.1);
      }
      .auth .btn.primary {
        width: 100%;
        margin-top: 4px;
      }
      .oauth {
        margin-top: 12px;
      }
      .oauth .btn {
        width: 100%;
        background: #fff;
      }
      .oauth .btn + .btn {
        margin-top: 8px;
      }
      .oauth .oauth-apple {
        background: #000;
        color: #fff;
        border-color: #000;
        font-weight: 600;
      }
      .sep {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--ink3);
        font-size: 11px;
        margin: 16px 0;
      }
      .sep::before,
      .sep::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--line);
      }
      .err {
        color: var(--verm-d);
        font-size: 12.5px;
        margin: 10px 2px 0;
        min-height: 16px;
        line-height: 1.5;
      }

      /* ---------- 弹层 ---------- */
      .scrim {
        position: fixed;
        inset: 0;
        background: rgba(23, 30, 40, 0.42);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
        z-index: 100;
        display: none;
        align-items: flex-end;
        justify-content: center;
      }
      .scrim.on {
        display: flex;
        animation: fade 0.2s ease;
      }
      @keyframes fade {
        from {
          opacity: 0;
        }
      }
      .sheet {
        width: 100%;
        max-width: 480px;
        background: var(--paper);
        border-radius: 24px 24px 0 0;
        padding: 10px 20px calc(var(--sa-b) + 22px);
        box-shadow: 0 -12px 40px rgba(0, 0, 0, 0.28);
        animation: rise 0.26s cubic-bezier(0.22, 1, 0.36, 1);
        max-height: 86vh;
        overflow-y: auto;
      }
      @keyframes rise {
        from {
          transform: translateY(100%);
        }
      }
      .grab {
        width: 40px;
        height: 4px;
        border-radius: 2px;
        background: rgba(27, 37, 48, 0.18);
        margin: 4px auto 16px;
      }
      .sheet h3 {
        font-family: var(--serif);
        font-size: 20px;
        letter-spacing: 1px;
        margin-bottom: 4px;
      }
      .sheet .desc {
        color: var(--ink3);
        font-size: 13px;
        line-height: 1.6;
        margin-bottom: 18px;
      }
      .menu-item {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
        padding: 15px 6px;
        font-size: 16px;
        border-bottom: 1px solid var(--line);
        text-align: left;
      }
      .menu-item:last-child {
        border-bottom: 0;
      }
      .menu-item .ic {
        width: 24px;
        text-align: center;
        font-size: 18px;
      }
      .menu-item.danger {
        color: var(--verm-d);
      }
      .emoji-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .emoji-row button {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        font-size: 22px;
        border: 1px solid var(--line);
        background: #fff;
      }
      .emoji-row button.on {
        border-color: var(--verm);
        box-shadow: 0 0 0 3px rgba(224, 73, 46, 0.13);
      }
      .codebox {
        font-family: var(--serif);
        font-size: 32px;
        letter-spacing: 8px;
        text-align: center;
        color: var(--verm);
        background: #fff;
        border: 1.5px dashed rgba(224, 73, 46, 0.4);
        border-radius: 14px;
        padding: 18px;
        margin: 4px 0 14px;
      }
      .members {
        margin-top: 6px;
      }
      .member {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 4px;
        font-size: 14px;
        border-bottom: 1px solid var(--line);
      }
      .member .av {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: var(--blue);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 13px;
        font-weight: 700;
      }
      .member .r {
        margin-left: auto;
        font-size: 11px;
        color: var(--ink3);
      }

      /* ---------- 直接进入 AI 旅行搭子的入口 ---------- */
      #homeAI {
        position: fixed;
        right: 18px;
        bottom: calc(var(--sa-b) + 84px);
        z-index: 180;
        width: 56px;
        height: 56px;
        border: 0;
        padding: 0;
        border-radius: 18px;
        background: linear-gradient(165deg, #ffffff, #eef1fb 68%, #e3e8f9);
        border: 1px solid rgba(120, 134, 200, 0.24);
        box-shadow: 0 10px 24px rgba(92, 108, 190, 0.28);
        display: grid;
        place-items: center;
        animation: homeAIBob 3.8s ease-in-out infinite;
      }
      #homeAI:active {
        transform: scale(0.94);
      }
      #homeAI .eyes {
        position: relative;
        width: 30px;
        height: 16px;
      }
      #homeAI .eyes i {
        position: absolute;
        top: 2px;
        width: 8px;
        height: 12px;
        border-radius: 3px;
        background: #3d4a8f;
        animation: homeAIBlink 5s infinite;
      }
      #homeAI .eyes i.l {
        left: 3px;
      }
      #homeAI .eyes i.r {
        right: 3px;
      }
      #homeAI .tip {
        position: absolute;
        right: 64px;
        top: 50%;
        transform: translateY(-50%);
        white-space: nowrap;
        background: rgba(27, 37, 48, 0.92);
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        padding: 6px 10px;
        border-radius: 10px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
      }
      #homeAI.hint .tip {
        opacity: 1;
      }
      @keyframes homeAIBob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      @keyframes homeAIBlink {
        0%, 44%, 46%, 100% { transform: scaleY(1); }
        45% { transform: scaleY(0.15); }
      }

      /* ---------- toast ---------- */
      #toast {
        position: fixed;
        left: 50%;
        bottom: calc(var(--sa-b) + 84px);
        transform: translateX(-50%) translateY(20px);
        background: rgba(27, 37, 48, 0.92);
        color: #fff;
        padding: 11px 18px;
        border-radius: 12px;
        font-size: 13.5px;
        max-width: 88vw;
        text-align: center;
        opacity: 0;
        pointer-events: none;
        transition: 0.28s;
        z-index: 200;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      }
      #toast.on {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .modebar {
        text-align: center;
        font-size: 11px;
        color: var(--ink3);
        letter-spacing: 1px;
        margin: 24px 0 0;
      }
      .hidden {
        display: none !important;
      }
      .spin {
        width: 26px;
        height: 26px;
        border: 3px solid var(--line);
        border-top-color: var(--verm);
        border-radius: 50%;
        animation: sp 0.8s linear infinite;
        margin: 40px auto;
      }
      @keyframes sp {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap" id="app">
      <div class="spin"></div>
    </div>

    <div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
    <div id="toast"></div>
    <input
      type="file"
      id="fileImport"
      accept=".json,application/json"
      class="hidden"
    />

    <script src="vendor/supabase.js"></script>
    <script src="app/config.js"></script>
    <script src="app/store.js"></script>
    <script>
      (function () {
        "use strict";
        function $(id) {
          return document.getElementById(id);
        }
        function esc(s) {
          return String(s == null ? "" : s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }
        function initials(name) {
          name = (name || "?").trim();
          return name.slice(0, 1).toUpperCase();
        }
        var _tt;
        function toast(m) {
          var t = $("toast");
          t.textContent = m;
          t.classList.add("on");
          clearTimeout(_tt);
          _tt = setTimeout(function () {
            t.classList.remove("on");
          }, 2600);
        }
        function openSheet(html) {
          $("sheet").innerHTML = '<div class="grab"></div>' + html;
          $("scrim").classList.add("on");
        }
        function closeSheet() {
          $("scrim").classList.remove("on");
        }
        $("scrim").addEventListener("click", function (e) {
          if (e.target === $("scrim")) closeSheet();
        });

        var EMOJIS = [
          "🗼",
          "🏯",
          "🗻",
          "⛩️",
          "🌸",
          "🍜",
          "🏝️",
          "🏔️",
          "🗽",
          "🎡",
          "🧳",
          "✈️",
        ];
        var PENDING_JOIN = null;

        /* ============ 启动 ============ */
        function boot() {
          var jm = location.search.match(/[?&]join=([^&]+)/);
          if (jm) PENDING_JOIN = decodeURIComponent(jm[1]).toUpperCase();

          PT.init().then(function () {
            PT.onAuth(function () {
              route();
            });
            route();
          });
        }
        function route() {
          if (PT.isCloud() && !PT.getUser()) {
            renderAuth();
          } else {
            renderList();
          }
        }

        /* ============ 登录（云端模式） ============ */
        var authMode = "signin";
        function renderAuth() {
          // 登录页不该有底部操作栏：清掉挂在 body 上的常驻 dock / AI 入口（退出登录时残留的根因）
          var _oldDock = $("dock");
          if (_oldDock) _oldDock.remove();
          var _oldAI = $("homeAI");
          if (_oldAI) _oldAI.remove();
          var oauthBtns = "";
          if (PT.authMethods.indexOf("apple") >= 0)
            oauthBtns +=
              '<button class="btn oauth-apple" id="aBtn"> 用 Apple 账号登录</button>';
          if (PT.authMethods.indexOf("google") >= 0)
            oauthBtns +=
              '<button class="btn" id="gBtn">🔵 用 Google 账号登录</button>';
          var oauth = oauthBtns
            ? '<div class="sep">或</div><div class="oauth">' + oauthBtns + "</div>"
            : "";
          $("app").innerHTML =
            '<div class="auth">' +
            '<div class="seal">旅</div>' +
            "<h2>" +
            esc(PT.appName) +
            "</h2>" +
            '<p class="sub">登录后，行程存在云端，可多设备同步、和同行的人共享</p>' +
            '<div class="card">' +
            '<div class="tabs"><button id="tSignin" class="on">登录</button><button id="tSignup">注册</button></div>' +
            '<div class="field" id="fName" style="display:none"><label>昵称</label><input id="iName" placeholder="同行的人会看到" /></div>' +
            '<div class="field"><label>邮箱</label><input id="iEmail" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com" /></div>' +
            '<div class="field"><label>密码</label><input id="iPw" type="password" autocomplete="current-password" placeholder="至少 6 位" /></div>' +
            '<button class="btn primary" id="doAuth">登录</button>' +
            '<div class="err" id="authErr"></div>' +
            oauth +
            "</div>" +
            (PENDING_JOIN
              ? '<p class="modebar">登录后将自动加入分享给你的行程（' +
                esc(PENDING_JOIN) +
                "）</p>"
              : "") +
            "</div>";

          function setMode(m) {
            authMode = m;
            $("tSignin").classList.toggle("on", m === "signin");
            $("tSignup").classList.toggle("on", m === "signup");
            $("fName").style.display = m === "signup" ? "" : "none";
            $("doAuth").textContent = m === "signin" ? "登录" : "注册并登录";
            $("iPw").setAttribute(
              "autocomplete",
              m === "signin" ? "current-password" : "new-password",
            );
            $("authErr").textContent = "";
          }
          $("tSignin").onclick = function () {
            setMode("signin");
          };
          $("tSignup").onclick = function () {
            setMode("signup");
          };
          $("doAuth").onclick = doAuth;
          if ($("gBtn"))
            $("gBtn").onclick = function () {
              PT.signInWithGoogle().catch(function (e) {
                $("authErr").textContent = e.message || "登录失败";
              });
            };
          if ($("aBtn"))
            $("aBtn").onclick = function () {
              PT.signInWithApple().catch(function (e) {
                $("authErr").textContent = e.message || "登录失败";
              });
            };
        }
        function doAuth() {
          var email = $("iEmail").value.trim(),
            pw = $("iPw").value,
            name = $("iName") ? $("iName").value.trim() : "";
          var err = $("authErr");
          err.textContent = "";
          if (!email || !pw) {
            err.textContent = "请填写邮箱和密码";
            return;
          }
          $("doAuth").textContent = "请稍候…";
          $("doAuth").disabled = true;
          var p =
            authMode === "signin"
              ? PT.signIn(email, pw)
              : PT.signUp(email, pw, name || email.split("@")[0]);
          p.then(
            function () {
              // onAuth 会触发 route()。若是注册且需邮箱验证，提示之。
              if (!PT.getUser()) {
                err.textContent =
                  "注册成功！请到邮箱点确认链接后再回来登录。";
                $("doAuth").textContent = "登录";
                $("doAuth").disabled = false;
              }
            },
            function (e) {
              err.textContent = friendlyAuthErr(e);
              $("doAuth").textContent =
                authMode === "signin" ? "登录" : "注册并登录";
              $("doAuth").disabled = false;
            },
          );
        }
        function friendlyAuthErr(e) {
          var m = (e && e.message) || "出错了";
          if (/Invalid login/i.test(m)) return "邮箱或密码不对";
          if (/already registered/i.test(m)) return "这个邮箱已注册，直接登录吧";
          if (/at least 6/i.test(m)) return "密码至少 6 位";
          return m;
        }

        /* ============ 行程列表 ============ */
        function renderList() {
          $("app").innerHTML = '<div class="spin"></div>';
          // 待处理的加入邀请
          if (PENDING_JOIN && PT.isCloud() && PT.getUser()) {
            var code = PENDING_JOIN;
            PENDING_JOIN = null;
            history.replaceState(null, "", location.pathname);
            PT.redeemInvite(code).then(
              function () {
                toast("✅ 已加入分享的行程");
                loadList();
              },
              function (e) {
                toast(e.message || "加入失败，邀请码可能已失效");
                loadList();
              },
            );
          } else {
            loadList();
          }
        }
        function loadList() {
          PT.listTrips().then(
            function (trips) {
              paintList(trips);
            },
            function (e) {
              $("app").innerHTML =
                '<div class="empty"><div class="big">📡</div><p>读取行程失败<br><span style="font-size:12px">' +
                esc(e.message || "") +
                "</span></p></div>";
              renderDock();
            },
          );
        }
        function paintList(trips) {
          var u = PT.getUser();
          var head =
            '<header class="top"><div class="brand"><div class="seal">旅</div><div><h1>' +
            esc(PT.appName) +
            "</h1><p>POCKET · TRAVEL</p></div></div>" +
            userChip(u) +
            "</header>";

          var body;
          if (!trips.length) {
            body =
              '<div class="empty"><div class="big">🧳</div><p>还没有行程。<br>新建一个，或导入朋友发来的行程 JSON。</p></div>' +
              newCard();
          } else {
            var cards = trips
              .map(function (t) {
                return tagCard(t);
              })
              .join("");
            body =
              '<div class="eyebrow">我的旅行 · ' +
              trips.length +
              "</div>" +
              '<div class="cards">' +
              cards +
              newCard() +
              "</div>";
          }

          var mode =
            '<p class="modebar">' +
            (PT.isCloud()
              ? "☁️ 云端模式 · 已同步"
              : "📱 本地模式 · 数据只存这台设备") +
            "</p>";

          $("app").innerHTML = head + body + mode;
          renderDock();
          renderHomeAI(trips);
          wireCards(trips);
        }
        /* 首页直达 AI 旅行搭子：打开最近（或第一份）行程并自动展开 AI 面板 */
        function renderHomeAI(trips) {
          var old = $("homeAI");
          if (old) old.remove();
          var btn = document.createElement("button");
          btn.id = "homeAI";
          btn.type = "button";
          btn.setAttribute("aria-label", "AI 旅行搭子");
          btn.innerHTML =
            '<span class="tip">问问 AI 旅行搭子</span>' +
            '<span class="eyes"><i class="l"></i><i class="r"></i></span>';
          document.body.appendChild(btn);
          /* 冒个泡提示一次它能点 */
          setTimeout(function () {
            btn.classList.add("hint");
            setTimeout(function () {
              btn.classList.remove("hint");
            }, 2600);
          }, 700);
          btn.onclick = function () {
            var lastId =
              (PT._cache && PT._cache.getLast && PT._cache.getLast()) || null;
            var ok =
              lastId &&
              trips.some(function (t) {
                return t.id === lastId;
              });
            var target = ok ? lastId : trips[0] && trips[0].id;
            if (target) {
              PT._cache.setLast(target);
              location.href =
                "trip.html?trip=" + encodeURIComponent(target) + "&ai=1";
            } else {
              toast("先建一份行程，AI 搭子就能帮你往里加地点啦");
              openCreate();
            }
          };
        }
        function userChip(u) {
          if (!u) return "";
          var name = u.name || "我";
          return (
            '<button class="chip" id="userChip"><span class="av">' +
            esc(initials(name)) +
            "</span>" +
            esc(name.length > 8 ? name.slice(0, 8) + "…" : name) +
            "</button>"
          );
        }
        function tagCard(t) {
          var role =
            t.role === "owner"
              ? '<span class="rolechip own">拥有</span>'
              : '<span class="rolechip shared">共享</span>';
          var owner =
            t.role !== "owner" && t.ownerName
              ? '<span>· ' + esc(t.ownerName) + " 分享</span>"
              : "";
          var when = t.updatedAt
            ? '<span>· ' + fmtWhen(t.updatedAt) + "</span>"
            : "";
          /* 从本地缓存的行程文档里算天数 / 地点数 + 取一张封面（离线、无网络请求）*/
          var doc = (PT.loadDocSync && PT.loadDocSync(t.id)) || null;
          var nDays = 0,
            nPlaces = 0,
            cover = "";
          if (doc) {
            nDays = (doc.DAYS || []).length;
            if (doc.P) {
              var ks = Object.keys(doc.P);
              nPlaces = ks.length;
              for (var i = 0; i < ks.length; i++) {
                var pp = doc.P[ks[i]];
                if (pp && pp.ph) {
                  cover = pp.ph;
                  break;
                }
              }
            }
          }
          var nights = nDays > 1 ? nDays - 1 : 0;
          var stats = "";
          if (nDays)
            stats +=
              '<span class="st">📅 ' +
              nDays +
              "天" +
              (nights ? nights + "晚" : "") +
              "</span>";
          if (nPlaces)
            stats += '<span class="st">📍 ' + nPlaces + "个地点</span>";
          var coverHtml = cover
            ? '<div class="cover" style="background-image:url(\'' +
              String(cover).replace(/'/g, "%27") +
              '\')"></div>'
            : '<div class="cover ph"><span>' +
              esc(t.emoji || "🧳") +
              "</span></div>";
          return (
            '<div class="tag rich" data-open="' +
            esc(t.id) +
            '">' +
            '<div class="body"><div class="ttl">' +
            esc(t.title || "未命名行程") +
            "</div>" +
            (stats ? '<div class="stats">' + stats + "</div>" : "") +
            '<div class="meta">' +
            role +
            owner +
            when +
            "</div></div>" +
            coverHtml +
            '<button class="more" data-menu="' +
            esc(t.id) +
            '">⋯</button>' +
            "</div>"
          );
        }
        function newCard() {
          return '<button class="tag new" id="newCard">＋ <b>新建行程</b></button>';
        }
        function fmtWhen(iso) {
          try {
            var d = new Date(iso),
              now = new Date();
            var diff = (now - d) / 86400000;
            if (diff < 1 && now.getDate() === d.getDate()) return "今天";
            if (diff < 2) return "昨天";
            if (diff < 8) return Math.floor(diff) + " 天前";
            return (
              d.getFullYear() +
              "/" +
              (d.getMonth() + 1) +
              "/" +
              d.getDate()
            );
          } catch (e) {
            return "";
          }
        }

        function wireCards(trips) {
          var map = {};
          trips.forEach(function (t) {
            map[t.id] = t;
          });
          [].forEach.call(document.querySelectorAll("[data-open]"), function (
            el,
          ) {
            el.addEventListener("click", function (e) {
              if (e.target.closest("[data-menu]")) return;
              var id = el.getAttribute("data-open");
              PT._cache.setLast(id);
              location.href = "trip.html?trip=" + encodeURIComponent(id);
            });
          });
          [].forEach.call(document.querySelectorAll("[data-menu]"), function (
            el,
          ) {
            el.addEventListener("click", function (e) {
              e.stopPropagation();
              openTripMenu(map[el.getAttribute("data-menu")]);
            });
          });
          if ($("newCard")) $("newCard").onclick = openCreate;
          if ($("userChip")) $("userChip").onclick = openUserMenu;
        }

        function renderDock() {
          // 列表页底部主操作：新建 + 导入 +（云端）加入
          var join = PT.isCloud()
            ? '<button class="btn" id="dJoin">🔗 加入分享</button>'
            : "";
          // dock 只在有内容时贴底；这里始终渲染
          var old = $("dock");
          if (old) old.remove();
          var dock = document.createElement("div");
          dock.className = "dock";
          dock.id = "dock";
          dock.innerHTML =
            '<button class="btn" id="dImport">📥 导入 JSON</button>' +
            join +
            '<button class="btn primary" id="dNew">＋ 新建</button>';
          document.body.appendChild(dock);
          $("dNew").onclick = openCreate;
          $("dImport").onclick = function () {
            $("fileImport").click();
          };
          if ($("dJoin")) $("dJoin").onclick = openJoin;
        }

        /* ============ 新建 / 导入 ============ */
        function openCreate() {
          var chosen = "🧳";
          var eh = EMOJIS.map(function (e) {
            return (
              '<button data-e="' +
              e +
              '"' +
              (e === chosen ? ' class="on"' : "") +
              ">" +
              e +
              "</button>"
            );
          }).join("");
          openSheet(
            "<h3>新建行程</h3>" +
              '<p class="desc">先起个名字，出发后再往里填地点。也可以直接用「导入 JSON」载入已有行程。</p>' +
              '<div class="field"><label>行程名字</label><input id="cTitle" placeholder="例：京都赏枫 5 日" /></div>' +
              '<label style="display:block;font-size:12px;color:var(--ink3);letter-spacing:1px;margin:0 0 8px 2px">封面</label>' +
              '<div class="emoji-row" id="cEmoji">' +
              eh +
              "</div>" +
              '<button class="btn primary" id="cGo" style="width:100%">创建</button>',
          );
          [].forEach.call($("cEmoji").children, function (b) {
            b.onclick = function () {
              chosen = b.getAttribute("data-e");
              [].forEach.call($("cEmoji").children, function (x) {
                x.classList.remove("on");
              });
              b.classList.add("on");
            };
          });
          $("cGo").onclick = function () {
            var title = $("cTitle").value.trim() || "新的旅行";
            $("cGo").textContent = "创建中…";
            $("cGo").disabled = true;
            PT.createTrip({ title: title, emoji: chosen }).then(
              function (t) {
                closeSheet();
                PT._cache.setLast(t.id);
                location.href = "trip.html?trip=" + encodeURIComponent(t.id);
              },
              function (e) {
                toast(e.message || "创建失败");
                $("cGo").textContent = "创建";
                $("cGo").disabled = false;
              },
            );
          };
        }

        $("fileImport").addEventListener("change", function (e) {
          var f = e.target.files && e.target.files[0];
          e.target.value = "";
          if (!f) return;
          var r = new FileReader();
          r.onload = function () {
            PT.importTrip(r.result).then(
              function (t) {
                toast("✅ 已导入：" + t.title);
                loadList();
              },
              function (err) {
                toast(err.message || "导入失败");
              },
            );
          };
          r.readAsText(f);
        });

        /* ============ 单个行程菜单 ============ */
        function openTripMenu(t) {
          if (!t) return;
          var isOwner = t.role === "owner";
          var shareBtn = PT.isCloud()
            ? '<button class="menu-item" id="mShare"><span class="ic">🔗</span>' +
              (isOwner ? "共享给同行的人" : "查看共享成员") +
              "</button>"
            : "";
          var lastRow = isOwner
            ? '<button class="menu-item danger" id="mDel"><span class="ic">🗑️</span>删除行程</button>'
            : '<button class="menu-item danger" id="mLeave"><span class="ic">🚪</span>退出这个共享行程</button>';
          openSheet(
            "<h3>" +
              esc(t.emoji + " " + t.title) +
              "</h3>" +
              '<div style="margin-top:8px">' +
              '<button class="menu-item" id="mOpen"><span class="ic">📖</span>打开</button>' +
              (isOwner
                ? '<button class="menu-item" id="mRename"><span class="ic">✏️</span>重命名 / 换封面</button>'
                : "") +
              shareBtn +
              '<button class="menu-item" id="mExport"><span class="ic">📤</span>导出 JSON</button>' +
              lastRow +
              "</div>",
          );
          $("mOpen").onclick = function () {
            location.href = "trip.html?trip=" + encodeURIComponent(t.id);
          };
          if ($("mRename"))
            $("mRename").onclick = function () {
              openRename(t);
            };
          if ($("mShare"))
            $("mShare").onclick = function () {
              openShare(t);
            };
          $("mExport").onclick = function () {
            doExport(t);
          };
          if ($("mDel"))
            $("mDel").onclick = function () {
              if (
                confirm(
                  "确定删除「" +
                    t.title +
                    "」？此操作不可恢复。" +
                    (PT.isCloud() ? "共享成员也将失去访问。" : ""),
                )
              ) {
                PT.deleteTrip(t.id).then(function () {
                  closeSheet();
                  toast("已删除");
                  loadList();
                }, function (e) { toast(e.message||"删除失败"); });
              }
            };
          if ($("mLeave"))
            $("mLeave").onclick = function () {
              if (confirm("退出后将不再看到这个行程，可以让对方重新分享。")) {
                PT.leaveTrip(t.id).then(function () {
                  closeSheet();
                  toast("已退出");
                  loadList();
                }, function (e) { toast(e.message||"操作失败"); });
              }
            };
        }

        function openRename(t) {
          var chosen = t.emoji || "🧳";
          var eh = EMOJIS.map(function (e) {
            return (
              '<button data-e="' +
              e +
              '"' +
              (e === chosen ? ' class="on"' : "") +
              ">" +
              e +
              "</button>"
            );
          }).join("");
          openSheet(
            "<h3>重命名</h3>" +
              '<div class="field"><label>行程名字</label><input id="rTitle" value="' +
              esc(t.title) +
              '" /></div>' +
              '<label style="display:block;font-size:12px;color:var(--ink3);letter-spacing:1px;margin:0 0 8px 2px">封面</label>' +
              '<div class="emoji-row" id="rEmoji">' +
              eh +
              "</div>" +
              '<button class="btn primary" id="rGo" style="width:100%">保存</button>',
          );
          [].forEach.call($("rEmoji").children, function (b) {
            b.onclick = function () {
              chosen = b.getAttribute("data-e");
              [].forEach.call($("rEmoji").children, function (x) {
                x.classList.remove("on");
              });
              b.classList.add("on");
            };
          });
          $("rGo").onclick = function () {
            PT.renameTrip(t.id, {
              title: $("rTitle").value.trim() || t.title,
              emoji: chosen,
            }).then(function () {
              closeSheet();
              loadList();
            }, function (e) { toast(e.message||"保存失败"); });
          };
        }

        function doExport(t) {
          PT.exportTrip(t.id).then(function (js) {
            var obj = JSON.parse(js);
            obj.meta = obj.meta || {};
            obj.meta.title = t.title;
            var blob = new Blob([JSON.stringify(obj, null, 2)], {
              type: "application/json",
            });
            var url = URL.createObjectURL(blob);
            var a = document.createElement("a");
            a.href = url;
            a.download = (t.title || "行程") + ".json";
            document.body.appendChild(a);
            a.click();
            setTimeout(function () {
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
            }, 120);
            closeSheet();
            toast("已导出，可发给同行的人");
          }, function (e) { toast(e.message||"导出失败"); });
        }

        /* ============ 共享（云端） ============ */
        function openShare(t) {
          openSheet(
            "<h3>共享「" +
              esc(t.title) +
              "」</h3>" +
              '<p class="desc">生成一个邀请码发给同行的人。对方登录后加入，两边的行程从此实时同步——谁改都能看到。</p>' +
              '<div id="shareBody"><div class="spin"></div></div>',
          );
          var isOwner = t.role === "owner";
          function showMembers() {
            PT.listMembers(t.id).then(
              function (ms) {
                var mh = ms
                  .map(function (m) {
                    return (
                      '<div class="member"><span class="av">' +
                      esc(initials(m.name)) +
                      "</span>" +
                      esc(m.name || "旅伴") +
                      '<span class="r">' +
                      (m.role === "owner" ? "拥有者" : "成员") +
                      "</span></div>"
                    );
                  })
                  .join("");
                var gen = isOwner
                  ? '<button class="btn primary" id="genCode" style="width:100%;margin-top:14px">生成邀请码</button>'
                  : "";
                $("shareBody").innerHTML =
                  '<div class="eyebrow" style="margin-top:4px">当前成员</div><div class="members">' +
                  mh +
                  "</div>" +
                  gen;
                if ($("genCode")) $("genCode").onclick = genInvite;
              },
              function (e) {
                $("shareBody").innerHTML =
                  '<p class="err">' + esc(e.message || "读取成员失败") + "</p>";
              },
            );
          }
          function genInvite() {
            $("genCode").textContent = "生成中…";
            $("genCode").disabled = true;
            PT.createInvite(t.id, "editor").then(
              function (inv) {
                $("shareBody").innerHTML =
                  '<div class="eyebrow" style="margin-top:4px">邀请码</div>' +
                  '<div class="codebox">' +
                  esc(inv.code) +
                  "</div>" +
                  '<button class="btn primary" id="copyLink" style="width:100%">复制邀请链接</button>' +
                  '<p class="desc" style="margin-top:12px">对方也可以在首页点「加入分享」手动输入这个码。邀请码 7 天内有效。</p>';
                $("copyLink").onclick = function () {
                  copy(inv.url);
                };
              },
              function (e) {
                $("shareBody").innerHTML =
                  '<p class="err">' + esc(e.message || "生成失败") + "</p>";
              },
            );
          }
          showMembers();
        }
        function openJoin() {
          openSheet(
            "<h3>加入分享的行程</h3>" +
              '<p class="desc">输入同行的人给你的 6 位邀请码。</p>' +
              '<div class="field"><input id="jCode" placeholder="例：K7P2QX" style="text-transform:uppercase;letter-spacing:4px;text-align:center;font-size:20px" maxlength="6" /></div>' +
              '<button class="btn primary" id="jGo" style="width:100%">加入</button>' +
              '<div class="err" id="jErr"></div>',
          );
          $("jGo").onclick = function () {
            var c = $("jCode").value.trim().toUpperCase();
            if (c.length < 4) {
              $("jErr").textContent = "邀请码不对";
              return;
            }
            $("jGo").textContent = "加入中…";
            $("jGo").disabled = true;
            PT.redeemInvite(c).then(
              function () {
                closeSheet();
                toast("✅ 已加入");
                loadList();
              },
              function (e) {
                $("jErr").textContent = e.message || "加入失败，邀请码可能已失效";
                $("jGo").textContent = "加入";
                $("jGo").disabled = false;
              },
            );
          };
        }

        /* ============ 用户菜单 ============ */
        function openUserMenu() {
          var u = PT.getUser();
          if (PT.isCloud()) {
            openSheet(
              "<h3>" +
                esc(u.name || "我") +
                "</h3>" +
                '<p class="desc">' +
                esc(u.email || "") +
                "</p>" +
                '<button class="menu-item danger" id="soBtn"><span class="ic">🚪</span>退出登录</button>',
            );
            $("soBtn").onclick = function () {
              PT.signOut().then(function () {
                closeSheet();
              });
            };
          } else {
            openSheet(
              "<h3>本地模式</h3>" +
                '<p class="desc">当前数据只保存在这台设备。想多设备同步、和朋友共享，可按 SETUP.md 配置云端后开启登录。</p>' +
                '<div class="field"><label>你的昵称</label><input id="nName" value="' +
                esc(u.name || "我") +
                '" /></div>' +
                '<button class="btn primary" id="nGo" style="width:100%">保存</button>',
            );
            $("nGo").onclick = function () {
              PT.setName($("nName").value.trim()).then(function () {
                closeSheet();
                loadList();
              });
            };
          }
        }

        /* ============ 复制 ============ */
        function copy(text) {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(
              function () {
                toast("链接已复制");
              },
              function () {
                fallbackCopy(text);
              },
            );
          } else fallbackCopy(text);
        }
        function fallbackCopy(text) {
          var ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          try {
            document.execCommand("copy");
            toast("链接已复制");
          } catch (e) {
            prompt("手动复制这个链接：", text);
          }
          document.body.removeChild(ta);
        }

        boot();
      })();
    </script>
  </body>
</html>
